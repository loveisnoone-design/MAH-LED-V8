<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MAH LED Wall</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e14;color:#e2e8f0;min-height:100vh;font-size:14px}
:root{
  --bg0:#0a0e14;--bg1:#111827;--bg2:#1c2433;--bg3:#243044;--border:#2d3a4e;--border2:#3d4f68;
  --blue:#4f9cf9;--green:#34d399;--orange:#fb923c;--yellow:#fbbf24;--purple:#a78bfa;
  --red:#f87171;--teal:#2dd4bf;--pink:#f472b6;--sky:#38bdf8;
  --text0:#f1f5f9;--text1:#94a3b8;--text2:#64748b;--accent:#3b82f6;--accent2:#6366f1
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0f172a,#162032);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(59,130,246,.4)}
.logo-title{font-size:15px;font-weight:700;color:var(--text0);letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text2);margin-top:1px}
.sync-badge{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(11,15,22,.95);border-top:1px solid var(--border);backdrop-filter:blur(20px);display:flex;padding:6px 0 env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:transparent;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;border-radius:8px;margin:0 2px}
.bnav-btn.act{color:var(--blue)}
.bnav-btn.act .bnav-icon{background:rgba(79,156,249,.15);color:var(--blue)}
.bnav-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.page{padding:12px 14px 90px;max-width:480px;margin:0 auto}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.card-p{padding:13px 14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:var(--text0);display:flex;align-items:center;gap:6px}

/* ── STAT BLOCKS ── */
.stat2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.stat-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 12px}
.stat-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:10px;color:var(--text1);margin-top:3px}
.stat-sub{font-size:10px;color:var(--text2);margin-top:2px}

/* ── BADGES ── */
.bx{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;line-height:1.4}
.b-g{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.b-o{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.b-y{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
.b-r{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.b-b{background:rgba(79,156,249,.12);color:var(--blue);border:1px solid rgba(79,156,249,.25)}
.b-p{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.b-gr{background:var(--bg2);color:var(--text1);border:1px solid var(--border)}
.b-t{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25)}

/* ── INPUTS ── */
.inp{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text0);font-size:13px;outline:none;font-family:inherit;transition:border .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text2)}
select.inp option{background:var(--bg1)}
textarea.inp{resize:none;min-height:60px}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .18s;line-height:1}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.35)}
.btn-p:hover{background:#2563eb}
.btn-s{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.btn-d{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-n{background:var(--bg2);color:var(--text0);border:1px solid var(--border)}
.btn-n:hover{border-color:var(--border2)}
.btn-y{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.btn-full{width:100%}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:8px}
.btn-xs{padding:4px 8px;font-size:10px;border-radius:6px}

/* ── PILLS ── */
.pills{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.pills::-webkit-scrollbar{display:none}
.pill{background:var(--bg2);border:1px solid var(--border);color:var(--text1);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .18s}
.pill.act{background:rgba(79,156,249,.15);color:var(--blue);border-color:rgba(79,156,249,.4)}

/* ── SUB TABS ── */
.stabs{display:flex;gap:3px;background:var(--bg2);border-radius:11px;padding:3px;margin-bottom:10px}
.stab{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;line-height:1.3}
.stab.act{background:var(--bg3);color:var(--blue);border:1px solid rgba(79,156,249,.3);font-weight:700}

/* ── ITEM ROWS ── */
.ir{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:11px 13px;cursor:pointer;transition:all .15s;margin-bottom:7px;active-state:background var(--bg2)}
.ir:active{background:var(--bg2);transform:scale(.99)}
.ir.out{border-left:3px solid var(--orange)}
.ir.repair{border-left:3px solid var(--red)}
.ir.damaged{border-left:3px solid var(--yellow)}
.ir-sn{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;color:var(--text0)}
.ir-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:10px;color:var(--text1);margin-top:4px}
.ir-note{font-size:10px;color:var(--yellow);margin-top:4px;background:rgba(251,191,36,.08);border-radius:5px;padding:3px 8px}

/* ── GROUP ACCORDION ── */
.grp{margin-bottom:8px}
.grp-h{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;user-select:none;transition:all .15s}
.grp-h:active{background:var(--bg3)}
.grp-h.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}
.grp-left{display:flex;align-items:center;gap:8px}
.grp-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.grp-name{font-size:13px;font-weight:700;color:var(--text0)}
.grp-count{font-size:10px;color:var(--text2)}
.grp-badges{display:flex;gap:4px;align-items:center}
.grp-arrow{font-size:12px;color:var(--text2);transition:transform .2s}
.grp-arrow.open{transform:rotate(90deg)}
.grp-body{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:10px;display:none}
.grp-body.open{display:block}

/* ── PROGRESS ── */
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:5px 0}
.pfill{height:100%;border-radius:2px;transition:width .6s ease}
.pbar-lg{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:4px 0}
.pfill-lg{height:100%;border-radius:3px}

/* ── CABLE CARD ── */
.cable-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.cable-card:active{background:var(--bg3)}
.cable-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.cable-name{font-size:12px;font-weight:700;color:var(--text0)}
.cable-spec{font-size:10px;color:var(--text2);font-family:monospace;margin-top:1px}
.cable-nums{display:flex;gap:10px;align-items:center}
.cable-main-num{font-size:22px;font-weight:800;letter-spacing:-1px}
.cable-total{font-size:10px;color:var(--text2)}
.cable-stats{display:flex;gap:7px;margin-top:6px}
.cable-stat{display:flex;align-items:center;gap:4px;font-size:10px}
.cs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── BULK ITEM ── */
.bulk-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.bulk-item:active{background:var(--bg3)}
.bulk-left{flex:1;min-width:0}
.bulk-name{font-size:12px;font-weight:600;color:var(--text0);margin-bottom:1px}
.bulk-spec{font-size:10px;color:var(--text2);font-family:monospace}
.bulk-right{text-align:right;flex-shrink:0;margin-left:12px}
.bulk-num{font-size:18px;font-weight:800;line-height:1}
.bulk-denom{font-size:10px;color:var(--text2)}

/* ── SCAN ── */
.scan-wrap{background:var(--bg2);border:2px dashed var(--border2);border-radius:14px;padding:20px 16px;text-align:center;margin-bottom:12px}
.scan-vw{position:relative;width:100%;max-width:280px;margin:0 auto;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3}
.scan-vw video{width:100%;height:100%;object-fit:cover;display:block}
.sline{position:absolute;left:8%;right:8%;height:2px;background:var(--blue);opacity:.9;animation:scan 2s ease-in-out infinite;box-shadow:0 0 10px var(--blue),0 0 20px var(--blue)}
@keyframes scan{0%,100%{top:18%}50%{top:78%}}
.c-corner{position:absolute;width:20px;height:20px;border-color:var(--blue);border-style:solid;border-width:0}
.c-tl{top:7px;left:7px;border-top-width:3px;border-left-width:3px;border-radius:3px 0 0 0}
.c-tr{top:7px;right:7px;border-top-width:3px;border-right-width:3px;border-radius:0 3px 0 0}
.c-bl{bottom:7px;left:7px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 3px}
.c-br{bottom:7px;right:7px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 3px 0}
.scan-live{display:flex;align-items:center;gap:7px;padding:7px 12px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.25);border-radius:8px;margin-top:8px}
.scan-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.mb{background:var(--bg1);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo-drag{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 0}
.mo-hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mo-title{font-size:15px;font-weight:700;color:var(--text0)}
.mo-close{background:var(--bg2);border:1px solid var(--border);color:var(--text1);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.mo-body{overflow-y:auto;flex:1;padding:0 18px 16px}
.mo-foot{padding:12px 18px calc(12px + env(safe-area-inset-bottom,0));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.dt{width:100%;font-size:12px;border-collapse:collapse}
.dt td{padding:7px 0;border-bottom:1px solid var(--border);vertical-align:top}
.dt td:first-child{color:var(--text2);width:38%;padding-right:10px;font-size:11px}
.dt tr:last-child td{border-bottom:none}

/* ── QTY CONTROL ── */
.qty-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:7px}
.qty-btn{width:32px;height:32px;border:1px solid var(--border2);background:var(--bg3);color:var(--text0);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;flex-shrink:0}
.qty-btn:active{background:var(--accent);border-color:var(--accent)}
.qty-mid{flex:1;text-align:center}
.qty-num{font-size:22px;font-weight:800;line-height:1}
.qty-lbl{font-size:10px;color:var(--text2);margin-top:2px}

/* ── WO SCAN LIST ── */
.wo-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-top:8px}
.wo-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-size:11px}
.wo-item.is-out{border-color:rgba(251,146,60,.35);background:rgba(251,146,60,.05)}
.wo-item.is-in{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.05)}

/* ── NOTIFY ── */
.nw{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;max-width:270px}
.nn{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;animation:nIn .3s ease;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes nIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.n-s{background:#134e35;border:1px solid var(--green)}.n-e{background:#4e1313;border:1px solid var(--red)}
.n-w{background:#4e3c13;border:1px solid var(--yellow)}.n-i{background:#13254e;border:1px solid var(--blue)}

/* ── AI CHAT ── */
.chat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:200px;max-height:320px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:9px}
.cm{max-width:85%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.55;word-break:break-word}
.cu{align-self:flex-end;background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px}
.ca{align-self:flex-start;background:var(--bg1);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.csugg{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:5px 11px;font-size:11px;color:var(--text1);cursor:pointer;font-family:inherit;transition:all .15s}
.csugg:hover{border-color:var(--accent);color:var(--blue)}
.spin{border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.fg{margin-bottom:12px}.fl{font-size:11px;color:var(--text1);display:block;margin-bottom:4px;font-weight:600}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
input[type=radio]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
/* Section label */
.sec{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;padding:8px 0 5px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
/* Dashboard compact table */
.dash-tbl{width:100%;font-size:12px;border-collapse:collapse}
.dash-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.dash-tbl td:first-child{color:var(--text0)}
.dash-tbl tr:last-child td{border-bottom:none}
.dash-tbl tr:hover td{background:var(--bg2);cursor:pointer}
/* Collapse section */
.collapse-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;cursor:pointer;user-select:none;margin-bottom:5px;transition:all .15s}
.collapse-hdr:active{background:var(--bg3)}
.collapse-hdr.open{border-radius:11px 11px 0 0}
.collapse-title{font-size:12px;font-weight:700;color:var(--text0);display:flex;align-items:center;gap:7px}
.collapse-arrow{color:var(--text2);font-size:12px;transition:transform .2s}
.collapse-arrow.open{transform:rotate(90deg)}
.collapse-body{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 11px 11px;padding:10px 13px;margin-bottom:8px}
</style>
</head>
<body>
<div id="nw" class="nw"></div>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px"><div class="spin" style="width:40px;height:40px;border-width:4px"></div><p style="color:var(--text2);font-size:13px">Loading...</p></div></div>
<script>(function(){var s=document.createElement('script');s.src='https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js';s.onerror=function(){window._zxF=true;};document.head.appendChild(s);})();</script>
<script>

// ── GOOGLE SHEET SYNC ────────────────────────────────────────────────────────
// Transport: JSONP for both GET and POST (no CORS preflight needed)
// Apps Script reads ?callback=xxx for JSONP, ?data=base64 for POST body

let _gsSyncTimer = null;
function debounceGsSync(){ clearTimeout(_gsSyncTimer); _gsSyncTimer=setTimeout(gsSync,2500); }

// ── JSONP GET ─────────────────────────────────────────────────────────────────
function gsJSONP(url){
  return new Promise((resolve, reject)=>{
    const cbName = '_mah_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = ()=>{ try{delete window[cbName]; script.remove();}catch(e){} };

    const timer = setTimeout(()=>{
      cleanup();
      reject(new Error('Timeout 12s — ตรวจสอบ URL และ Apps Script Deploy settings'));
    }, 12000);

    window[cbName] = function(data){
      clearTimeout(timer); cleanup(); resolve(data);
    };

    script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cbName;
    script.onerror = function(e){
      clearTimeout(timer); cleanup();
      reject(new Error('ไม่สามารถโหลด Script — URL ไม่ถูกต้อง หรือ Apps Script ยังไม่ได้ Deploy'));
    };
    document.head.appendChild(script);
  });
}

// ── JSONP POST (encode body as base64 in query string) ────────────────────────
function gsJSONP_POST(url, body){
  // Strategy: fetch with Content-Type text/plain avoids CORS preflight
  // Apps Script reads e.postData.contents in doPost()
  return new Promise((resolve, reject)=>{
    const jsonStr = JSON.stringify(body);
    const timer   = setTimeout(()=>reject(new Error('POST Timeout (20s)')), 20000);

    fetch(url, {
      method:  'POST',
      body:    jsonStr,
      // text/plain avoids preflight OPTIONS request
      headers: {'Content-Type': 'text/plain;charset=UTF-8'},
      redirect:'follow',
      mode:    'no-cors'  // prevents CORS error; response is opaque
    })
    .then(res=>{
      clearTimeout(timer);
      // no-cors gives opaque response (status=0, body unreadable)
      // We treat HTTP 0/200 as success for write operations
      resolve({success:true, note:'no-cors opaque response'});
    })
    .catch(err=>{
      clearTimeout(timer);
      // If fetch fails entirely, fallback to small JSONP GET
      if(jsonStr.length < 6000){
        gsFallbackPost(url, body).then(resolve).catch(reject);
      } else {
        reject(new Error('POST failed: ' + err.message));
      }
    });
  });
}

// Fallback for small payloads via JSONP GET
function gsFallbackPost(url, body){
  return new Promise((resolve, reject)=>{
    const cbName = '_mah_fb_' + Date.now();
    const script = document.createElement('script');
    const cleanup = ()=>{ try{delete window[cbName]; script.remove();}catch(e){} };
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Fallback timeout')); }, 12000);
    window[cbName] = d=>{ clearTimeout(timer); cleanup(); resolve(d); };
    let enc;
    try{ enc = btoa(unescape(encodeURIComponent(JSON.stringify(body)))); }
    catch(e){ cleanup(); reject(new Error('Encode: '+e.message)); return; }
    if(enc.length > 5000){ cleanup(); reject(new Error('Payload too large for GET')); return; }
    script.src = url+'?callback='+cbName+'&data='+encodeURIComponent(enc);
    script.onerror = ()=>{ clearTimeout(timer); cleanup(); reject(new Error('Script failed')); };
    document.head.appendChild(script);
  });
}

async function gsSync(){
  if(!S.gsUrl) return;
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    const payload = {
      action: 'syncAll',
      cabs:   CAB.map(c=>({sn:c.sn,status:c.status,cond:c.cond,currentWO:c.currentWO||'',upd:c.upd||''})),
      cables: Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
      acc:    ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0})),
      wo:     WO
    };
    // Fire-and-forget POST (no-cors → opaque response, treat as success)
    await gsJSONP_POST(S.gsUrl, payload);
    S.gsStatus='ok';
  }catch(e){
    S.gsStatus='error';
    console.warn('gsSync:', e.message);
  }
  updateSyncBadge();
}

async function gsInit(){
  if(!S.gsUrl){ notify('กรุณาใส่ URL ก่อน','w'); return; }
  let url = S.gsUrl.trim().replace(/\/+$/,'');
  if(url.endsWith('/dev')){
    notify('⚠️ ใช้ URL ที่ลงท้าย /exec ไม่ใช่ /dev','w');
    return;
  }
  S.gsUrl = url;
  S.gsStatus = 'syncing'; updateSyncBadge(); render();
  try{
    const data = await gsJSONP(url + '?action=ping');
    if(data && (data.success || data.pong)){
      S.gsStatus = 'ok';
      notify('✅ เชื่อมต่อ Google Sheet สำเร็จ','s');
    } else {
      throw new Error('Response: ' + JSON.stringify(data));
    }
  }catch(e){
    S.gsStatus = 'error';
    notify('❌ ' + e.message, 'e');
  }
  updateSyncBadge(); render();
}

async function gsInitSheets(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    // initSheets payload is small enough for JSONP fallback
    await gsJSONP_POST(S.gsUrl, {action:'initSheets'});
    notify('✅ สร้าง Sheets สำเร็จ — กำลัง Push ข้อมูล...','s');
    // Wait a moment for sheets to be created
    await new Promise(r=>setTimeout(r,2000));
    await gsPushAll();
  }catch(e){
    S.gsStatus='error'; notify('❌ initSheets: '+e.message,'e'); updateSyncBadge();
  }
}

async function gsPushAll(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  notify('📤 กำลัง Push...','i');
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    const payload={
      action:'syncAll',
      cabs:  CAB.map(c=>({sn:c.sn,status:c.status,cond:c.cond,currentWO:c.currentWO||'',upd:c.upd||''})),
      cables:Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
      acc:   ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0})),
      wo:    WO
    };
    await gsJSONP_POST(S.gsUrl, payload);
    // no-cors → assume success
    S.gsStatus='ok'; notify('✅ Push สำเร็จ (Google Sheet อัปเดตแล้ว)','s');
  }catch(e){
    S.gsStatus='error'; notify('❌ Push: '+e.message,'e');
  }
  updateSyncBadge();
}

async function gsPullAll(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  notify('📥 กำลัง Pull...','i');
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    const data = await gsJSONP(S.gsUrl + '?action=getAll');
    if(!data || !data.success) throw new Error(data?.error || 'Pull failed');
    if(data.data?.cabinets && data.data.cabinets.length){
      const map = {};
      data.data.cabinets.forEach(c=>{ map[c.sn]=c; });
      CAB = CAB.map(c=>{
        if(map[c.sn]){
          const g = map[c.sn];
          return {...c, status:g.status||c.status, cond:g.cond||c.cond, currentWO:g.currentWO||null};
        }
        return c;
      });
    }
    if(data.data?.workOrders) WO = data.data.workOrders;
    await sv();
    S.gsStatus='ok'; notify('✅ Pull สำเร็จ','s'); render();
  }catch(e){
    S.gsStatus='error'; notify('❌ Pull: ' + e.message,'e');
  }
  updateSyncBadge();
}

function updateSyncBadge(){
  const b = document.querySelector('.sync-badge');
  if(!b) return;
  if(!S.gsUrl){ b.innerHTML='☁️ Local'; b.style.color='var(--text1)'; b.style.borderColor='var(--border)'; return; }
  const states = {
    syncing: {text:'🔄 Syncing',  color:'var(--yellow)'},
    ok:      {text:'● GSheet',   color:'var(--green)'},
    error:   {text:'● Sync Err', color:'var(--red)'},
    idle:    {text:'● GSheet',   color:'var(--green)'},
  };
  const st = states[S.gsStatus] || states.idle;
  b.innerHTML = st.text;
  b.style.color = st.color;
  b.style.borderColor = st.color.replace('var(','rgba(').replace(')',', .4)').replace('--yellow','210,153,34').replace('--green','63,185,80').replace('--red','248,81,73');
}

function expandMods(m){
  if(Array.isArray(m)&&m.length===2&&typeof m[1]==='number'){
    const base=m[0],n=m[1];
    return Array.from({length:n},(_,i)=>`${base}-${i+1}`);
  }
  return Array.isArray(m)?m:[];
}

function initSeed(){
  const now=new Date().toISOString();
  CAB=CAB_SEED.map((r,i)=>({
    id:i+1,fc:r[0],sz:SIZES[r[1]||0],sn:r[2],pdu:r[3],
    mods:expandMods(r[4]),cond:r[5]||'good',note:r[6]||'',model:MODELS[r[7]||0],
    status:'in_stock',currentWO:null,upd:now
  }));
  ITEMS=[];
  Object.values(ITEM_DB).flat().forEach(r=>{
    ITEMS.push({id:r[0],group:r[1],subgroup:r[2],sn:r[3],spec:r[4],note:r[5],
      status:r[6]||'in_stock',cond:'good',currentWO:null,upd:now});

  CABLES={};
  Object.entries(CABLE_DB).forEach(([k,v])=>{CABLES[k]={...v,out:0,repair:0};});
  ACC=ACC_DB.map(a=>({...a}));
}

      if(p){const j=JSON.parse(p);cd=JSON.stringify(j.cab);id=JSON.stringify(j.items);cbd=JSON.stringify(j.cables);ad=JSON.stringify(j.acc);wd=JSON.stringify(j.wo);}
    }
    if(cd)CAB=JSON.parse(cd); else{initSeed();await sv();return done();}
    if(id)ITEMS=JSON.parse(id); else{ITEMS=[];Object.values(ITEM_DB).flat().forEach(r=>{ITEMS.push({id:r[0],group:r[1],subgroup:r[2],sn:r[3],spec:r[4],note:r[5],status:r[6]||'in_stock',cond:'good',currentWO:null,upd:new Date().toISOString()});});}
    if(cbd){CABLES=JSON.parse(cbd);Object.entries(CABLE_DB).forEach(([k,v])=>{if(!CABLES[k])CABLES[k]={...v,out:0,repair:0};});}
    else{CABLES={};Object.entries(CABLE_DB).forEach(([k,v])=>{CABLES[k]={...v,out:0,repair:0};});}
    if(ad)ACC=JSON.parse(ad); else ACC=ACC_DB.map(a=>({...a}));
    if(wd)WO=JSON.parse(wd); else WO=[];
  }catch(e){initSeed();}
  done();
}

function done(){
  S.loading=false;
  // Load GS URL from storage
  try{
    if(window.storage){
      window.storage.get('mah_v8_cfg').then(r=>{if(r){const cfg=JSON.parse(r.value);S.gsUrl=cfg.gsUrl||'';updateSyncBadge();}}).catch(()=>{});
    } else {
      const cfg=JSON.parse(localStorage.getItem('mah_v8_cfg')||'{}');
      S.gsUrl=cfg.gsUrl||'';
    }
  }catch(e){}
  render();
}

function findScan(q){
  const u=q.trim().toUpperCase();
  let c=CAB.find(c=>c.sn.toUpperCase().includes(u)||(c.pdu||'').toUpperCase().includes(u)||(c.mods||[]).some(m=>m.toUpperCase().includes(u)));
  if(c)return{type:'cab',data:c};
  let i=ITEMS.find(i=>i.sn&&i.sn.toUpperCase().includes(u));
  if(i)return{type:'item',data:i};
  return null;
}

// ── SCANNER ──
let _scanStream=null, _scanRAF=null, _scanDetector=null;

function stopScan(){
  S.scanOn=false;
  if(_scanRAF){cancelAnimationFrame(_scanRAF);_scanRAF=null;}
  if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}
  _scanDetector=null;
}

function startScan(vid,cb){
  S.scanOn=true; render();
  setTimeout(async()=>{
    const v=document.getElementById(vid);
    if(!v){stopScan();render();return;}
    try{
      // Request camera
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
      });
      _scanStream = stream;
      v.srcObject = stream;
      await v.play();

      // Use BarcodeDetector API (Safari 17+, Chrome)
      if('BarcodeDetector' in window){
        _scanDetector = new BarcodeDetector({formats:['code_128','qr_code','ean_13','code_39','pdf417','aztec']});
        let lastScan = 0;
        const detect = async()=>{
          if(!_scanStream||!S.scanOn) return;
          const now = Date.now();
          if(now-lastScan > 800 && v.readyState >= 2){
            try{
              const codes = await _scanDetector.detect(v);
              if(codes.length > 0){
                lastScan = now;
                cb(codes[0].rawValue);
              }
            }catch(e){}
          }
          _scanRAF = requestAnimationFrame(detect);
        };
        _scanRAF = requestAnimationFrame(detect);
      } else {
        // Fallback: ZXing if available
        if(window.ZXingBrowser){
          const reader = new window.ZXingBrowser.BrowserMultiFormatReader();
          reader.decodeFromVideoDevice(null,v,res=>{if(res&&S.scanOn)cb(res.getText());})
            .then(ctrl=>{ if(!_scanStream)ctrl.stop(); })
            .catch(e=>notify('Scanner: '+e.message,'e'));
        } else {
          notify('กล้องสแกนไม่รองรับ — กรุณาพิมพ์ SN','w');
          stopScan(); render();
        }
      }
    }catch(e){
      notify('ไม่สามารถเปิดกล้องได้: '+e.message,'e');
      stopScan(); render();
    }
  },150);
}

function buildCabSection(q, s, limit=80){
  let fl=CAB.filter(c=>{
    if(q&&!(c.sn.toLowerCase().includes(q)||(c.pdu||'').toLowerCase().includes(q)||(c.fc||'').toLowerCase().includes(q)||(c.mods||[]).some(m=>m.toLowerCase().includes(q))))return false;
    if(S.stF!=='all'&&c.status!==S.stF)return false;
    if(S.szF!=='all'&&c.sz!==S.szF)return false;
    return true;
  });
  const sh=fl.slice(0,limit);
  return`<div>
${S.sub==='cabinet'?`<div class="pills">
${[['all','ทุกขนาด'],['500x1000mm','500×1000'],['500x500mm','500×500']].map(([k,l])=>`<button class="pill ${S.szF===k?'act':''}" data-szf="${k}">${l}</button>`).join('')}
</div>`:''}
<div style="font-size:10px;color:var(--text2);margin-bottom:7px">แสดง ${sh.length} / ${fl.length}</div>
${sh.map(c=>`<div class="ir ${c.status==='out'?'out':c.status==='repair'?'repair':c.cond==='damaged'?'damaged':''}" data-ocab="${c.sn}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
    <span class="ir-sn">${c.sn}</span>
    <div style="display:flex;gap:3px">${bdg(ST[c.status]?.c||'b-g',ST[c.status]?.l||'?')}${c.cond!=='good'?' '+bdg(CD[c.cond]?.c||'b-y',CD[c.cond]?.l||'?'):''}</div>
  </div>
  <div class="ir-meta"><span>📦 ${c.fc}</span><span>📐 ${c.sz}</span><span>🔌 ${(c.pdu||'-').slice(0,16)}</span><span>💡 ${(c.mods||[]).length}</span></div>
  ${c.note?`<div class="ir-note">⚠️ ${c.note.slice(0,60)}</div>`:''}
</div>`).join('')}
${fl.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:8px">+${fl.length-limit} รายการ — ค้นหาเพิ่ม</div>`:''}
</div>`;
}

function buildStructSection(q, limit=80){
  const hbL=ITEMS.filter(i=>i.subgroup==='Hanging Bar DBmk2-1000mm');
  const hbS=ITEMS.filter(i=>i.subgroup==='Hanging Bar RS-500mm');
  const fL=hbL.filter(i=>(!q||(i.sn||'').toLowerCase().includes(q))&&(S.stF==='all'||i.status===S.stF));
  const fS=hbS.filter(i=>(!q||(i.sn||'').toLowerCase().includes(q))&&(S.stF==='all'||i.status===S.stF));
  return`<div>
<div class="sec">Hanging Bar DBmk2-1000mm (${hbL.length} ชิ้น)</div>
${fL.slice(0,limit).map(it=>serialRow(it)).join('')}
${fL.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${fL.length-limit}</div>`:''}
<div class="sec">Hanging Bar RS-500mm (${hbS.length} ชิ้น)</div>
${fS.slice(0,limit).map(it=>serialRow(it)).join('')}
${fS.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${fS.length-limit}</div>`:''}
</div>`;
}

function buildCableSection(q){
  return`<div>
${Object.entries(CABLES).map(([k,v])=>{
  if(q&&!v.name.toLowerCase().includes(q)&&!v.spec.toLowerCase().includes(q))return'';
  const avail=v.total-v.out-v.repair;
  const pct=v.total>0?Math.round(avail/v.total*100):100;
  return`<div class="cable-card" data-cbl="${k}">
    <div class="cable-top">
      <div>
        <div class="cable-name">${v.icon} ${v.name}</div>
        <div class="cable-spec">${v.spec}</div>
      </div>
      <div class="cable-nums">
        <div>
          <div class="cable-main-num" style="color:${v.color}">${avail}</div>
          <div class="cable-total">/ ${v.total} เส้น</div>
        </div>
      </div>
    </div>
    <div class="pbar-lg"><div class="pfill-lg" style="width:${pct}%;background:${v.color}"></div></div>
    <div class="cable-stats">
      <div class="cable-stat"><div class="cs-dot" style="background:var(--green)"></div><span style="color:var(--green)">ในคลัง ${avail}</span></div>
      ${v.out>0?`<div class="cable-stat"><div class="cs-dot" style="background:var(--orange)"></div><span style="color:var(--orange)">ออก ${v.out}</span></div>`:''}
      ${v.repair>0?`<div class="cable-stat"><div class="cs-dot" style="background:var(--red)"></div><span style="color:var(--red)">ซ่อม ${v.repair}</span></div>`:''}
    </div>
  </div>`;}).join('')}
</div>`;
}

function buildSpareSection(q, limit=80){
  const groups=[
    {key:'spare_module',icon:'💡',name:'Spare Module',color:'var(--orange)'},
    {key:'recv_card',icon:'🎛️',name:'Receiving Card A8S-N',color:'var(--purple)'},
    {key:'hub',icon:'🔗',name:'HUB Card',color:'var(--pink)'},
    {key:'psu',icon:'⚡',name:'Power Supply',color:'var(--yellow)'},
    {key:'pdu_spare',icon:'🔌',name:'PDU Spare',color:'var(--teal)'},
  ];
  return`<div>${groups.map(g=>{
    let items=ITEMS.filter(i=>i.group===g.key);
    if(q)items=items.filter(i=>(i.sn||'').toLowerCase().includes(q)||(i.spec||'').toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q));
    // Status filter (allow 'installed' too)
    if(S.stF!=='all')items=items.filter(i=>i.status===S.stF);
    // For spare_module: show status counts
    const installed=g.key==='spare_module'?items.filter(i=>i.status==='installed').length:0;
    const inStk=g.key==='spare_module'?items.filter(i=>i.status==='in_stock').length:0;
    const hdr = g.key==='spare_module'
      ? `<div class="sec">${g.icon} ${g.name} — ${bdg('b-t',installed+' ติดตั้งแล้ว')} ${bdg('b-g',inStk+' ในคลัง')} <span style="color:var(--text2);font-size:10px">ทุกชิ้นมี SN</span></div>`
      : `<div class="sec">${g.icon} ${g.name} (${items.length} ชิ้น)</div>`;
    return hdr +
      items.slice(0,limit).map(it=>{
        // Enhanced row for spare module
        if(g.key==='spare_module'){
          const noteParts = (it.note||'').split('·');
          const cabLine = noteParts[0]||'';
          const issueLine = noteParts[2]||'';
          return`<div class="ir ${it.status==='installed'?'out':''}" data-oitem="${it.id}">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
<span class="ir-sn">${it.sn}</span>
<div style="display:flex;gap:3px">${bdg(ST[it.status]?.c||'b-t',ST[it.status]?.l||'?')}</div>
</div>
<div class="ir-meta">
${cabLine?`<span style="color:var(--text0)">🖥️ ${cabLine.trim()}</span>`:''}
${issueLine?`<span style="color:var(--yellow)">🔍 ${issueLine.trim()}</span>`:''}
</div>
</div>`;
        }
        return serialRow(it);
      }).join('') +
      (items.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${items.length-limit}</div>`:'');
  }).join('')}</div>`;
}

function buildAccSection(q){
  const subs=['LED Processor','Module Spare','Bracket','Screw','Washer','LED Spare','Tool','ThermalPad','Storage','Flight Case'];
  return`<div>${subs.map(s=>{
    let items=s==='LED Processor'?ACC.filter(a=>a.group==='processor'):ACC.filter(a=>a.sub===s);
    if(q)items=items.filter(a=>(a.name||'').toLowerCase().includes(q)||(a.spec||'').toLowerCase().includes(q));
    if(!items.length)return'';
    return`<div class="sec">${s}</div>${items.map(a=>{
      const avail=(a.qty||0)-(a.out||0)-(a.repair||0);
      const pct=a.qty>0?Math.round(avail/a.qty*100):100;
      return`<div class="bulk-item" data-oblk="${a.id}">
        <div class="bulk-left">
          <div class="bulk-name">${a.name}</div>
          <div class="bulk-spec">${a.spec}</div>
          <div class="pbar" style="max-width:160px"><div class="pfill" style="width:${pct}%;background:var(--green)"></div></div>
        </div>
        <div class="bulk-right">
          <div class="bulk-num" style="color:${avail>0?'var(--green)':'var(--red)'}">${avail.toLocaleString()}</div>
          <div class="bulk-denom">/ ${a.qty.toLocaleString()}</div>
          ${a.out>0?`<div style="font-size:10px;color:var(--orange)">ออก ${a.out}</div>`:''}
        </div>
      </div>`;}).join('')}`;
  }).join('')}</div>`;
}

function serialRow(it){
  return`<div class="ir ${it.status==='out'?'out':it.status==='repair'?'repair':''}" data-oitem="${it.id}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
    <span class="ir-sn" style="font-size:11px">${it.sn||it.id}</span>
    <div style="display:flex;gap:3px">${bdg(ST[it.status]?.c||'b-g',ST[it.status]?.l||'?')}${it.cond&&it.cond!=='good'?' '+bdg(CD[it.cond]?.c||'b-y',CD[it.cond]?.l||'?'):''}</div>
  </div>
  <div class="ir-meta"><span style="font-family:monospace">${it.spec||''}</span>${it.note?`<span>📝 ${it.note.slice(0,35)}</span>`:''}</div>
</div>`;
}

  const woItems=(wo.items||[]).map(id=>ITEMS.find(i=>i.id===id)).filter(Boolean);
  const itemsOut=woItems.filter(i=>i.status==='out');
  const itemsIn=woItems.filter(i=>i.status!=='out');
  // Can close only if all items have confirmed status

].map(x=>`<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:${x.c}">${x.v}</div><div style="font-size:10px;color:var(--text2)">${x.l}</div></div>`).join('<div style="color:var(--border2)">|</div>')}

  if(!wo) return '';

  const woCabs = CAB.filter(c=>wo.cabs.includes(c.sn));
  const n1000 = woCabs.filter(c=>c.sz==='500x1000mm').length;
  const n500  = woCabs.filter(c=>c.sz==='500x500mm').length;

  // Auto-calculate based on ACTUAL cabinet count
  const autoAcc = {
    hb:     Math.ceil(n1000 + n500*0.5),
    il_sig: wo.cabs.length,
    il_pwr: wo.cabs.length,
    m_sig:  Math.ceil(wo.cabs.length/8)*2,
    m_pwr:  Math.ceil(wo.cabs.length/10),
  };
  const acc = wo.accessories || {};

  // Final values: use override if set, else auto
  const val = k => acc[k]!==undefined ? acc[k] : autoAcc[k];

  const extras = wo.extras||[];
  const now = new Date().toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'});

  return`<div class="mo" id="sum-bg"><div class="mb">

  <span class="mo-title">📄 สรุปใบงาน</span>

  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px">

    ${wo.cabs.map(sn=>{
      const c=CAB.find(cc=>cc.sn===sn);
      return`<div style="font-size:10px;font-family:monospace;padding:3px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
        <span>${sn}</span>
        <span style="color:${c?.status==='out'?'var(--orange)':'var(--green)'}">${c?.status==='out'?'ออก':'คลัง'}</span>
      </div>`;}).join('')}
  </div>

  <div style="font-size:10px;color:var(--text2);text-align:center">สร้างเมื่อ ${wo.createdAt?new Date(wo.createdAt).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):'-'}</div>
</div>
<div class="mo-foot"><button class="btn btn-n btn-full" id="sum-x2">ปิด</button></div>
</div></div>`;
}


function openWOEdit(woId){
  const wo = WO.find(w=>w.id===woId)||null;
  if(!wo) return;
  S.woEdit = wo; S.woSummary = null; S.modal = 'woedit';
  render();
}

function printWOSummary(){
  const area = document.getElementById('wo-print-area');
  if(!area) return;
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>ใบงาน</title>
<style>body{font-family:sans-serif;padding:20px;color:#111;max-width:500px}table{width:100%;border-collapse:collapse}td{padding:6px 4px;border-bottom:1px solid #eee;font-size:13px}h2{font-size:16px;margin-bottom:4px}@media print{button{display:none}}</style>
</head><body>${area.innerHTML}<br><button onclick="window.print()">Print</button></body></html>`);
  w.document.close();
}


// ── LOCAL AI FALLBACK (works offline) ──────────────────────────────────
function localAI(msg, ctx){
  const m = msg.toLowerCase();

  // ── Detect screen size query ─────────────────────────────────────────
  const szMatch = msg.match(/(\d+(?:\.\d+)?)\s*[mx×xX]\s*(\d+(?:\.\d+)?)/i);

  if(szMatch && (m.includes('จอ')||m.includes('ขนาด')||m.includes('ต้องใช้')||m.includes('คำนวณ')||m.includes('screen'))){
    const W = parseFloat(szMatch[1]);
    const H = parseFloat(szMatch[2]);

    if(W>0 && H>0 && W<=100 && H<=30){
      const s = stats();
      const procAvail = (ACC.find(a=>a.id==='PROC-01')?.qty||12)-(ACC.find(a=>a.id==='PROC-01')?.out||0);

      // ── Cabinet layout: mixed 1000mm + 500mm ──────────────────────
      // กว้าง: ทุก cabinet กว้าง 500mm → cols = W ÷ 0.5
      const cols = Math.round(W / 0.5);
      // สูง: Cabinet 1000mm ก่อน (floor) + Cabinet 500mm ส่วนที่เหลือ
      const rows1000 = Math.floor(H / 1.0);
      const remH     = Math.round((H - rows1000 * 1.0) * 10) / 10;
      const rows500  = remH >= 0.45 ? Math.round(remH / 0.5) : 0;
      const actualH  = rows1000 * 1.0 + rows500 * 0.5;

      const n1000 = cols * rows1000;
      const n500  = cols * rows500;
      const nAll  = n1000 + n500;

      const resW = cols * 200;
      const resH = rows1000 * 400 + rows500 * 200;
      const kg   = n1000 * 9 + n500 * 4.5;

      // Hanging Bar = แนวนอนตามความกว้าง, DBmk2-1000mm ยาว 1m/ชิ้น
      const hb = Math.round(W / 1.0);

      // Cables & Processor
      const il      = nAll;
      const ports   = Math.ceil(nAll / 8);
      const msTotal = ports * 2;
      const mp      = Math.ceil(nAll / 10);
      const proc    = Math.ceil(ports * 2 / 20);

      const ok_cab1 = s.c1000.in >= n1000;
      const ok_cab5 = s.c500.in  >= n500;
      const ok_hb   = s.hbL.in   >= hb;
      const ok_il   = s.cables.il_signal?.in  >= il;
      const ok_ms   = s.cables.main_signal?.in >= msTotal;
      const ok_mp   = s.cables.main_power?.in  >= mp;
      const ok_proc = procAvail >= proc;

      let out = `📐 **จอ ${W}m × ${H}m** → สูงจริง ${actualH}m\n\n`;

      if(n1000 > 0) out += `📦 Cabinet 500×1000mm: **${n1000} ชิ้น** (${cols}คอล × ${rows1000}แถว) ${ok_cab1?'✅':'❌ มี '+s.c1000.in}\n`;
      if(n500  > 0) out += `📦 Cabinet 500×500mm:  **${n500} ชิ้น** (${cols}คอล × ${rows500}แถว) ${ok_cab5?'✅':'❌ มี '+s.c500.in}\n`;

      out += `🏗️ Hanging Bar DBmk2-1000mm: **${hb} ชิ้น** (${W}m ÷ 1m แนวนอน) ${ok_hb?'✅':'❌ มี '+s.hbL.in}\n`;
      out += `🖥️ Resolution: **${resW}×${resH} px**\n`;
      out += `⚖️ น้ำหนักรวม: **${kg} kg** (${(kg/1000).toFixed(2)} ตัน)\n\n`;

      out += `🔗 Interlink Signal 1.3m: **${il} เส้น** ${ok_il?'✅':'❌'}\n`;
      out += `⚡ Interlink Power 1.3m: **${il} เส้น** ${s.cables.il_power?.in>=il?'✅':'❌'}\n`;
      out += `📶 Main Signal 10m: **${msTotal} เส้น** (${ports}+${ports}) ${ok_ms?'✅':'❌'}\n`;
      out += `⚡ Main Power 10m: **${mp} เส้น** ${ok_mp?'✅':'❌'}\n`;
      out += `💻 Novastar VX2000Pro: **${proc} เครื่อง**\n`;
      out += `   └ ${ports} main + ${ports} backup = ${ports*2} ports ÷ 20 ${ok_proc?'✅':'❌ มี '+procAvail}\n\n`;

      out += `📊 สรุปของในคลัง:\n`;
      if(n1000>0) out += `• Cabinet 1000mm: ${s.c1000.in}/${s.c1000.total} ${ok_cab1?'✅':'❌ ขาด '+(n1000-s.c1000.in)}\n`;
      if(n500>0)  out += `• Cabinet 500mm:  ${s.c500.in}/${s.c500.total} ${ok_cab5?'✅':'❌ ขาด '+(n500-s.c500.in)}\n`;
      out += `• Hanging Bar: ${s.hbL.in}/${s.hbL.total} ${ok_hb?'✅':'❌ ขาด '+(hb-s.hbL.in)}\n`;
      out += `• Main Signal: ${s.cables.main_signal?.in}/${s.cables.main_signal?.total} ${ok_ms?'✅':'❌ ขาด '+(msTotal-(s.cables.main_signal?.in||0))}\n`;
      out += `• VX2000Pro:   ${procAvail}/${ACC.find(a=>a.id==='PROC-01')?.qty||12} ${ok_proc?'✅':'❌ ขาด '+(proc-procAvail)}`;

      return out;
    }
  }

  // ── Status summary ────────────────────────────────────────────────────
  if(m.includes('สรุป')||m.includes('status')||m.includes('สถานะ')){
    const s = stats();
    const procAvail=(ACC.find(a=>a.id==='PROC-01')?.qty||12)-(ACC.find(a=>a.id==='PROC-01')?.out||0);
    const cvtAvail=(ACC.find(a=>a.id==='PROC-02')?.qty||8)-(ACC.find(a=>a.id==='PROC-02')?.out||0);
    return `📊 **สรุปสถานะคลัง MAH LED Wall**\n\n` +
      `🖥️ Cabinet:\n• 500×1000mm: ${s.c1000.in}/${s.c1000.total}${s.c1000.out>0?' | ออก '+s.c1000.out:''}\n` +
      `• 500×500mm: ${s.c500.in}/${s.c500.total}${s.c500.out>0?' | ออก '+s.c500.out:''}\n\n` +
      `🏗️ Hanging Bar:\n• DBmk2-1000mm: ${s.hbL.in}/${s.hbL.total}\n• RS-500mm: ${s.hbS.in}/${s.hbS.total}\n\n` +
      `📡 Cable:\n• Interlink Signal: ${s.cables.il_signal?.in}/${s.cables.il_signal?.total}\n` +
      `• Interlink Power: ${s.cables.il_power?.in}/${s.cables.il_power?.total}\n` +
      `• Main Signal 10m: ${s.cables.main_signal?.in}/${s.cables.main_signal?.total}\n` +
      `• Main Power 10m: ${s.cables.main_power?.in}/${s.cables.main_power?.total}\n\n` +
      `💻 Processor:\n• VX2000Pro: ${procAvail}/${ACC.find(a=>a.id==='PROC-01')?.qty||12}\n` +
      `• CVT-M: ${cvtAvail}/${ACC.find(a=>a.id==='PROC-02')?.qty||8}\n\n` +
      `🔧 Spare Module: ${ITEMS.filter(i=>i.group==='spare_module'&&i.status==='in_stock').length}/160\n` +
      `📋 ใบงาน Active: ${s.activeWO}`;
  }

  // ── PDU query ─────────────────────────────────────────────────────────
  if(m.includes('pdu')){
    const pduL=ITEMS.filter(i=>i.subgroup==='PDU Spare 500x1000'&&i.status==='in_stock').length;
    const pduS=ITEMS.filter(i=>i.subgroup==='PDU Spare 500x500'&&i.status==='in_stock').length;
    return `🔌 **PDU Spare คงเหลือ:**\n• IRRS-500x1000: **${pduL}** ชิ้น\n• IRRS-500x500: **${pduS}** ชิ้น`;
  }

  return null; // let API handle it
}

// ═══════════════ BIND EVENTS ═══════════════
function bindAll(){
  // Bottom nav tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{if(S.scanOn)stopScan();S.tab=b.dataset.tab;S.q='';render();}));
  document.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>{S.sub=b.dataset.sub;S.q='';render();}));
  // Search + filter
  const iq=document.getElementById('iq');
  if(iq){iq.addEventListener('input',()=>{S.q=iq.value;render();});setTimeout(()=>{if(document.getElementById('iq'))document.getElementById('iq').focus();},50);}
  const sf=document.getElementById('stfil');
  if(sf)sf.addEventListener('change',()=>{S.stF=sf.value;render();});
  document.querySelectorAll('[data-szf]').forEach(b=>b.addEventListener('click',()=>{S.szF=b.dataset.szf;render();}));
  // Collapse sections
  document.querySelectorAll('[data-col]').forEach(b=>b.addEventListener('click',()=>{
    const[pfx,key]=b.dataset.col.split(':');
    if(pfx==='dash')S.dashOpen[key]=!S.dashOpen[key];
    render();
  }));
  document.querySelectorAll('[data-invgrp]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.invgrp;
    S.invGroups[k]=S.invGroups[k]===undefined?false:!S.invGroups[k];
    render();
  }));
  // Open items
  document.querySelectorAll('[data-ocab]').forEach(r=>r.addEventListener('click',()=>{S.selCab=CAB.find(c=>c.sn===r.dataset.ocab)||null;if(S.selCab){S.modal='cab';render();}}));
  document.querySelectorAll('[data-oitem]').forEach(r=>r.addEventListener('click',()=>{S.selItem=ITEMS.find(i=>i.id===r.dataset.oitem)||null;if(S.selItem){S.modal='item';render();}}));
  document.querySelectorAll('[data-oblk]').forEach(r=>r.addEventListener('click',()=>{S.selBulk=r.dataset.oblk;S.modal='bulk';render();}));
  document.querySelectorAll('[data-cbl]').forEach(r=>r.addEventListener('click',()=>{S.selBulk=r.dataset.cbl;S.modal='cable';render();}));
  // Modal closes
  const MC={'mo-bg':()=>{S.modal=null;S.selCab=null;},'mo-x':()=>{S.modal=null;S.selCab=null;},'mo-x2':()=>{S.modal=null;S.selCab=null;},'it-bg':()=>{S.modal=null;S.selItem=null;},'it-x':()=>{S.modal=null;S.selItem=null;},'it-x2':()=>{S.modal=null;S.selItem=null;},'blk-bg':()=>{S.modal=null;S.selBulk=null;},'blk-x':()=>{S.modal=null;S.selBulk=null;},'blk-x2':()=>{S.modal=null;S.selBulk=null;},'cbl-bg':()=>{S.modal=null;S.selBulk=null;},'cbl-x':()=>{S.modal=null;S.selBulk=null;},'cbl-x2':()=>{S.modal=null;S.selBulk=null;},'wof-bg':()=>{S.modal=null;},'wof-x':()=>{S.modal=null;},'ret-bg':()=>{S.modal=null;S.retT=null;},'ret-x':()=>{S.modal=null;S.retT=null;},'co-bg':()=>{stopScan();S.modal=null;S.woCheck=null;},'co-x':()=>{stopScan();S.modal=null;S.woCheck=null;},'co-x2':()=>{stopScan();S.modal=null;S.woCheck=null;},
    'woe-bg':()=>{S.modal=null;S.woEdit=null;},'woe-x':()=>{S.modal=null;S.woEdit=null;}};
  Object.entries(MC).forEach(([id,fn])=>{const el=document.getElementById(id);if(el)el.addEventListener('click',e=>{if(id.endsWith('-bg')&&e.target!==el)return;fn();render();});});
  // Cabinet status/cond
  document.querySelectorAll('[data-sst]').forEach(b=>b.addEventListener('click',()=>{const[sn,st]=b.dataset.sst.split(':');updCab(sn,{status:st});S.selCab=CAB.find(c=>c.sn===sn);notify(`${sn} → ${ST[st]?.l}`,'s');render();}));
  document.querySelectorAll('[data-scd]').forEach(b=>b.addEventListener('click',()=>{const[sn,cd]=b.dataset.scd.split(':');updCab(sn,{cond:cd});S.selCab=CAB.find(c=>c.sn===sn);notify(`${sn} → ${CD[cd]?.l}`,'s');render();}));
  // Item status/cond
  document.querySelectorAll('[data-ssti]').forEach(b=>b.addEventListener('click',()=>{const[id,st]=b.dataset.ssti.split(':');updItem(id,{status:st});S.selItem=ITEMS.find(i=>i.id===id);notify(`→ ${ST[st]?.l}`,'s');render();}));
  document.querySelectorAll('[data-scdi]').forEach(b=>b.addEventListener('click',()=>{const[id,cd]=b.dataset.scdi.split(':');updItem(id,{cond:cd});S.selItem=ITEMS.find(i=>i.id===id);notify(`→ ${CD[cd]?.l}`,'s');render();}));
  // Bulk qty
  document.querySelectorAll('[data-qadj]').forEach(b=>b.addEventListener('click',()=>{
    const[id,op]=b.dataset.qadj.split(':');const a=ACC.find(x=>x.id===id);if(!a)return;
    const avail=(a.qty||0)-(a.out||0)-(a.repair||0);
    let{out=0,repair=0}=a;
    if(op==='+out'){if(avail<=0){notify('ของหมด','e');return;}out++;}
    else if(op==='-out'){if(out<=0){notify('ไม่มีที่ออก','w');return;}out--;}
    else if(op==='+rep'){if(avail<=0){notify('ของหมด','e');return;}repair++;}
    else if(op==='-rep'){if(repair<=0)return;repair--;}
    updAcc(id,{out,repair});S.selBulk=id;render();
  }));
  // Cable qty
  document.querySelectorAll('[data-cadj]').forEach(b=>b.addEventListener('click',()=>{
    const[k,op]=b.dataset.cadj.split(':');const v=CABLES[k];if(!v)return;
    const avail=v.total-v.out-v.repair;
    let{out=0,repair=0}=v;
    if(op==='+out'){if(avail<=0){notify('หมด','e');return;}out++;}
    else if(op==='-out'){if(out<=0)return;out--;}
    else if(op==='+rep'){if(avail<=0){notify('หมด','e');return;}repair++;}
    else if(op==='-rep'){if(repair<=0)return;repair--;}
    updCable(k,{out,repair});S.selBulk=k;render();
  }));
  // Return
  document.querySelectorAll('[data-mret-c],[data-sr-ret-c]').forEach(b=>b.addEventListener('click',()=>{const sn=b.dataset.mretC||b.dataset.srRetC;S.retT={type:'cab',sn};S.retCond='good';S.retNote='';S.modal='ret';render();}));
  document.querySelectorAll('[data-mret-i],[data-sr-ret-i]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.mretI||b.dataset.srRetI;const it=ITEMS.find(x=>x.id===id);S.retT={type:'item',id,sn:it?.sn};S.retCond='good';S.retNote='';S.modal='ret';render();}));
  document.querySelectorAll('[data-rc]').forEach(r=>r.addEventListener('change',()=>{S.retCond=r.dataset.rc;render();}));
  const retOk=document.getElementById('ret-ok');
  if(retOk)retOk.addEventListener('click',()=>{
    const note=document.getElementById('ret-note')?.value||'';
    const t=S.retT;

  const btnWoeSave = document.getElementById('btn-woe-save');
  if(btnWoeSave) btnWoeSave.addEventListener('click',()=>{
    S.woEdit.name  = document.getElementById('woe-name')?.value?.trim()||S.woEdit.name;
    S.woEdit.loc   = document.getElementById('woe-loc')?.value?.trim()||'';
    S.woEdit.resp  = document.getElementById('woe-resp')?.value?.trim()||'';
    S.woEdit.start = document.getElementById('woe-start')?.value||'';
    S.woEdit.end   = document.getElementById('woe-end')?.value||'';
    S.woEdit.notes = document.getElementById('woe-notes')?.value||'';
    S.woEdit.lastUpdated = new Date().toISOString();
    WO = WO.map(w=>w.id===S.woEdit.id?{...S.woEdit}:w);
    sv(); S.modal=null; S.woEdit=null;
    notify('บันทึกใบงานแล้ว','s'); render();
  });

  // ── WO Summary ──
  document.querySelectorAll('[data-wo-summary]').forEach(b=>b.addEventListener('click',()=>{
    S.woSummary=WO.find(w=>w.id===b.dataset.woSummary)||null;
    if(S.woSummary){S.modal='wosummary';render();}
  }));
  ['sum-bg','sum-x','sum-x2'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('click',e=>{if(id==='sum-bg'&&e.target!==el)return;S.modal=null;S.woSummary=null;render();});});

  // ── WO Acc edit ──
  document.querySelectorAll('[data-wo-acc-edit]').forEach(b=>b.addEventListener('click',()=>{
    const[key,cur]=b.dataset.woAccEdit.split(':');
    const val=prompt(`จำนวน ${key}:`,cur);
    if(val===null)return;
    const n=parseInt(val);if(isNaN(n))return;
    if(!S.woSummary)return;
    S.woSummary.accessories=S.woSummary.accessories||{};
    S.woSummary.accessories[key]=n;
    S.woSummary.lastUpdated=new Date().toISOString();
    WO=WO.map(w=>w.id===S.woSummary.id?{...S.woSummary}:w);
    sv();render();
  }));

  // ── Dash goto ──
  document.querySelectorAll('[data-dash-goto]').forEach(b=>b.addEventListener('click',()=>{
    const gt=b.dataset.dashGoto;
    S.tab='inv';S.sub='cabinet';
    if(gt==='cab1000'){S.szF='500x1000mm';}
    else if(gt==='cab500'){S.szF='500x500mm';}
    else if(gt==='spare'){S.sub='spare';}
    render();
  }));

  // ── Module edit button in cabModal ──
  const btnModEdit=document.getElementById('btn-mod-edit');
  if(btnModEdit)btnModEdit.addEventListener('click',()=>{S.modal='modedit';render();});

  // AI
  const ai=document.getElementById('ai-inp');
  if(ai){ai.addEventListener('input',()=>{S.aiIn=ai.value;});ai.addEventListener('keydown',e=>{if(e.key==='Enter')doAI(S.aiIn);});}
  const bai=document.getElementById('btn-ai');if(bai)bai.addEventListener('click',()=>doAI(S.aiIn));
  document.querySelectorAll('[data-sug]').forEach(b=>b.addEventListener('click',()=>doAI(b.dataset.sug)));
  const cw=document.getElementById('cwrap');if(cw)cw.scrollTop=cw.scrollHeight;
}

async function doAI(msg){
  if(!msg.trim()||S.aiLoad)return;
  S.aiIn='';S.aiChat.push({role:'user',content:msg.trim()});S.aiLoad=true;render();
  const s=stats();
  const ctx=`คุณเป็น AI ผู้เชี่ยวชาญ LED Wall สำหรับ MAH ธุรกิจให้เช่า Event ตอบเป็นภาษาไทย กระชับ มืออาชีพ

ข้อมูลผลิตภัณฑ์:
Cabinet 500×1000mm: Resolution 200×400px | น้ำหนัก 9kg | 4 Modules
Cabinet 500×500mm: Resolution 200×200px | น้ำหนัก 4.5kg | 2 Modules
Hanging Bar DBmk2-1000mm: รองรับ Cabinet 1000mm 1 แถว (ยาว 1m/ชิ้น)
Hanging Bar RS-500mm: รองรับ Cabinet 500mm 1 แถว (ยาว 0.5m/ชิ้น)
Interlink Signal/Power 1.3m: 1 เส้น/Cabinet
Main Signal Cable 10m: 1 เส้น ต่อ 8 Cabinets
Main Power Cable 10m: 1 เส้น ต่อ 10 Cabinets
Novastar VX2000Pro: 20 Ports | 1 Port = max 8 Cabinets | ต้องมี Backup Port = จำนวน Port ที่ใช้ (เพิ่ม Signal 10m เท่ากัน)

สูตรคำนวณจอ LED:
จำนวน Cabinet 500×1000mm = (ความกว้างm / 0.5) × (ความสูงm / 1.0)  
[หรือ Cabinet 500×500mm = (กว้างm/0.5) × (สูงm/0.5)]
Resolution รวม = จำนวน Cabinet × 200×400px (1000mm) หรือ 200×200px (500mm)
น้ำหนักรวม = จำนวน Cabinet × 9kg (1000mm) หรือ 4.5kg (500mm)
Main Signal 10m = ceil(จำนวนCabinet/8) × 2 (main + backup รวม)
Main Power 10m = ceil(จำนวนCabinet/10)
Interlink Signal 1.3m = จำนวนCabinet (1:1)
Interlink Power 1.3m = จำนวนCabinet (1:1)
Hanging Bar DBmk2-1000mm = ความกว้างจอ (m) ÷ 1.0 เพราะวางแนวนอนตามความกว้างเท่านั้น ไม่นับความสูง
Hanging Bar RS-500mm (Cabinet 500×500) = ความกว้างจอ (m) ÷ 0.5
VX2000Pro 20 ports/เครื่อง: ports main = ceil(Cabinet/8), ports backup = เท่ากัน → รวม = ports×2
จำนวน VX2000Pro = ceil(ports×2 / 20) [ตัวอย่าง: จอ 20m×4m → Cabinet 160 → ports=20 → 40 ports รวม → 2 เครื่อง]

ข้อมูลคลังปัจจุบัน:
Cabinet 500×1000mm: ${s.c1000.in}/${s.c1000.total} (ออก ${s.c1000.out})
Cabinet 500×500mm: ${s.c500.in}/${s.c500.total} (ออก ${s.c500.out})
Hanging Bar 1000mm: ${s.hbL.in}/${s.hbL.total} | 500mm: ${s.hbS.in}/${s.hbS.total}
Main Power 10m: ${s.cables.main_power?.in}/${s.cables.main_power?.total}
Main Signal 10m: ${s.cables.main_signal?.in}/${s.cables.main_signal?.total}
Interlink Signal 1.3m: ${s.cables.il_signal?.in}/${s.cables.il_signal?.total}
Interlink Power 1.3m: ${s.cables.il_power?.in}/${s.cables.il_power?.total}
Cat6 Cable 10m: ${s.cables.cat6?.in}/${s.cables.cat6?.total}
Novastar VX2000Pro: ${(ACC.find(a=>a.id==='PROC-01')?.qty||12)-(ACC.find(a=>a.id==='PROC-01')?.out||0)}/${ACC.find(a=>a.id==='PROC-01')?.qty||12}
Novastar CVT-M: ${(ACC.find(a=>a.id==='PROC-02')?.qty||8)-(ACC.find(a=>a.id==='PROC-02')?.out||0)}/${ACC.find(a=>a.id==='PROC-02')?.qty||8}
Spare Module SN: ${ITEMS.filter(i=>i.group==='spare_module'&&i.status==='in_stock').length} ชิ้น (+ 160 bulk)
ใบงาน Active: ${s.activeWO}

เมื่อมีคำถามเกี่ยวกับการติดตั้งจอ LED หรือคำนวณขนาดจอ ให้แสดงรายการอุปกรณ์ที่ต้องใช้ครบถ้วน พร้อม Resolution รวม น้ำหนักรวม และตรวจสอบว่าของในคลังพอหรือไม่`;

  try{
    const body={model:'claude-sonnet-4-20250514',max_tokens:1000,system:ctx,messages:S.aiChat.map(m=>({role:m.role,content:m.content}))};
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const d=await res.json();
    if(d.error){
      S.aiChat.push({role:'assistant',content:`❌ API Error: ${d.error.message||JSON.stringify(d.error)}`});
    } else {
      const txt=d.content?.map(c=>c.type==='text'?c.text:'').join('')||'ไม่สามารถตอบได้';
      S.aiChat.push({role:'assistant',content:txt});
    }
  }catch(e){
    // Fallback: calculate locally for common questions
    const ans = localAI(msg.trim(), ctx);
    S.aiChat.push({role:'assistant',content: ans || `❌ เชื่อมต่อ AI ไม่ได้: ${e.message}. กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต`});
  }
  S.aiLoad=false;render();
  setTimeout(()=>{const c=document.getElementById('cwrap');if(c)c.scrollTop=c.scrollHeight;},50);
}

loadData();
</script>
