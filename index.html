<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e14;color:#e2e8f0;min-height:100vh;font-size:14px}
:root{
  --bg0:#0a0e14;--bg1:#111827;--bg2:#1c2433;--bg3:#243044;--border:#2d3a4e;--border2:#3d4f68;
  --blue:#4f9cf9;--green:#34d399;--orange:#fb923c;--yellow:#fbbf24;--purple:#a78bfa;
  --red:#f87171;--teal:#2dd4bf;--pink:#f472b6;--sky:#38bdf8;
  --text0:#f1f5f9;--text1:#94a3b8;--text2:#64748b;--accent:#3b82f6;--accent2:#6366f1
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0f172a,#162032);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(59,130,246,.4)}
.logo-title{font-size:15px;font-weight:700;color:var(--text0);letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text2);margin-top:1px}
.sync-badge{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(11,15,22,.95);border-top:1px solid var(--border);backdrop-filter:blur(20px);display:flex;padding:6px 0 env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:transparent;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;border-radius:8px;margin:0 2px}
.bnav-btn.act{color:var(--blue)}
.bnav-btn.act .bnav-icon{background:rgba(79,156,249,.15);color:var(--blue)}
.bnav-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.page{padding:12px 14px 90px;max-width:480px;margin:0 auto}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.card-p{padding:13px 14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:var(--text0);display:flex;align-items:center;gap:6px}

/* ── STAT BLOCKS ── */
.stat2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.stat-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 12px}
.stat-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:10px;color:var(--text1);margin-top:3px}
.stat-sub{font-size:10px;color:var(--text2);margin-top:2px}

/* ── BADGES ── */
.bx{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;line-height:1.4}
.b-g{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.b-o{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.b-y{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
.b-r{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.b-b{background:rgba(79,156,249,.12);color:var(--blue);border:1px solid rgba(79,156,249,.25)}
.b-p{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.b-gr{background:var(--bg2);color:var(--text1);border:1px solid var(--border)}
.b-t{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25)}

/* ── INPUTS ── */
.inp{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text0);font-size:13px;outline:none;font-family:inherit;transition:border .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text2)}
select.inp option{background:var(--bg1)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .18s;line-height:1}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.35)}
.btn-p:hover{background:#2563eb}
.btn-s{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.btn-d{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-n{background:var(--bg2);color:var(--text0);border:1px solid var(--border)}
.btn-n:hover{border-color:var(--border2)}
.btn-y{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.btn-full{width:100%}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:8px}
.btn-xs{padding:4px 8px;font-size:10px;border-radius:6px}

/* ── PILLS ── */
.pills{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.pills::-webkit-scrollbar{display:none}
.pill{background:var(--bg2);border:1px solid var(--border);color:var(--text1);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .18s}
.pill.act{background:rgba(79,156,249,.15);color:var(--blue);border-color:rgba(79,156,249,.4)}

/* ── SUB TABS ── */
.stabs{display:flex;gap:3px;background:var(--bg2);border-radius:11px;padding:3px;margin-bottom:10px}
.stab{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;line-height:1.3}
.stab.act{background:var(--bg3);color:var(--blue);border:1px solid rgba(79,156,249,.3);font-weight:700}

/* ── ITEM ROWS ── */
.ir{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:11px 13px;cursor:pointer;transition:all .15s;margin-bottom:7px;active-state:background var(--bg2)}
.ir:active{background:var(--bg2);transform:scale(.99)}
.ir.out{border-left:3px solid var(--orange)}
.ir.repair{border-left:3px solid var(--red)}
.ir.damaged{border-left:3px solid var(--yellow)}
.ir-sn{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;color:var(--text0)}
.ir-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:10px;color:var(--text1);margin-top:4px}
.ir-note{font-size:10px;color:var(--yellow);margin-top:4px;background:rgba(251,191,36,.08);border-radius:5px;padding:3px 8px}

/* ── GROUP ACCORDION ── */
.grp{margin-bottom:8px}
.grp-h{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;user-select:none;transition:all .15s}
.grp-h:active{background:var(--bg3)}
.grp-h.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}
.grp-left{display:flex;align-items:center;gap:8px}
.grp-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.grp-name{font-size:13px;font-weight:700;color:var(--text0)}
.grp-count{font-size:10px;color:var(--text2)}
.grp-badges{display:flex;gap:4px;align-items:center}
.grp-arrow{font-size:12px;color:var(--text2);transition:transform .2s}
.grp-arrow.open{transform:rotate(90deg)}
.grp-body{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:10px;display:none}
.grp-body.open{display:block}

/* ── PROGRESS ── */
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:5px 0}
.pfill{height:100%;border-radius:2px;transition:width .6s ease}
.pbar-lg{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:4px 0}
.pfill-lg{height:100%;border-radius:3px}

/* ── CABLE CARD ── */
.cable-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.cable-card:active{background:var(--bg3)}
.cable-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.cable-name{font-size:12px;font-weight:700;color:var(--text0)}
.cable-spec{font-size:10px;color:var(--text2);font-family:monospace;margin-top:1px}
.cable-nums{display:flex;gap:10px;align-items:center}
.cable-main-num{font-size:22px;font-weight:800;letter-spacing:-1px}
.cable-total{font-size:10px;color:var(--text2)}
.cable-stats{display:flex;gap:7px;margin-top:6px}
.cable-stat{display:flex;align-items:center;gap:4px;font-size:10px}
.cs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── BULK ITEM ── */
.bulk-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.bulk-item:active{background:var(--bg3)}
.bulk-left{flex:1;min-width:0}
.bulk-name{font-size:12px;font-weight:600;color:var(--text0);margin-bottom:1px}
.bulk-spec{font-size:10px;color:var(--text2);font-family:monospace}
.bulk-right{text-align:right;flex-shrink:0;margin-left:12px}
.bulk-num{font-size:18px;font-weight:800;line-height:1}
.bulk-denom{font-size:10px;color:var(--text2)}

/* ── SCAN ── */
.scan-wrap{background:var(--bg2);border:2px dashed var(--border2);border-radius:14px;padding:20px 16px;text-align:center;margin-bottom:12px}
.scan-vw{position:relative;width:100%;max-width:280px;margin:0 auto;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3}
.scan-vw video{width:100%;height:100%;object-fit:cover;display:block}
.sline{position:absolute;left:8%;right:8%;height:2px;background:var(--blue);opacity:.9;animation:scan 2s ease-in-out infinite;box-shadow:0 0 10px var(--blue),0 0 20px var(--blue)}
@keyframes scan{0%,100%{top:18%}50%{top:78%}}
.c-corner{position:absolute;width:20px;height:20px;border-color:var(--blue);border-style:solid;border-width:0}
.c-tl{top:7px;left:7px;border-top-width:3px;border-left-width:3px;border-radius:3px 0 0 0}
.c-tr{top:7px;right:7px;border-top-width:3px;border-right-width:3px;border-radius:0 3px 0 0}
.c-bl{bottom:7px;left:7px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 3px}
.c-br{bottom:7px;right:7px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 3px 0}
.scan-live{display:flex;align-items:center;gap:7px;padding:7px 12px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.25);border-radius:8px;margin-top:8px}
.scan-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.mb{background:var(--bg1);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo-drag{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 0}
.mo-hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mo-title{font-size:15px;font-weight:700;color:var(--text0)}
.mo-close{background:var(--bg2);border:1px solid var(--border);color:var(--text1);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.mo-body{overflow-y:auto;flex:1;padding:0 18px 16px}
.mo-foot{padding:12px 18px calc(12px + env(safe-area-inset-bottom,0));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.dt{width:100%;font-size:12px;border-collapse:collapse}
.dt td{padding:7px 0;border-bottom:1px solid var(--border);vertical-align:top}
.dt td:first-child{color:var(--text2);width:38%;padding-right:10px;font-size:11px}
.dt tr:last-child td{border-bottom:none}

/* ── QTY CONTROL ── */
.qty-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:7px}
.qty-btn{width:32px;height:32px;border:1px solid var(--border2);background:var(--bg3);color:var(--text0);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;flex-shrink:0}
.qty-btn:active{background:var(--accent);border-color:var(--accent)}
.qty-mid{flex:1;text-align:center}
.qty-num{font-size:22px;font-weight:800;line-height:1}
.qty-lbl{font-size:10px;color:var(--text2);margin-top:2px}

/* ── WO SCAN LIST ── */
.wo-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-top:8px}
.wo-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-size:11px}
.wo-item.is-out{border-color:rgba(251,146,60,.35);background:rgba(251,146,60,.05)}
.wo-item.is-in{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.05)}

/* ── NOTIFY ── */
.nw{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;max-width:270px}
.nn{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;animation:nIn .3s ease;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes nIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.n-s{background:#134e35;border:1px solid var(--green)}.n-e{background:#4e1313;border:1px solid var(--red)}
.n-w{background:#4e3c13;border:1px solid var(--yellow)}.n-i{background:#13254e;border:1px solid var(--blue)}

/* ── AI CHAT ── */
.chat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:200px;max-height:320px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:9px}
.cm{max-width:85%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.55;word-break:break-word}
.cu{align-self:flex-end;background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px}
.ca{align-self:flex-start;background:var(--bg1);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.csugg{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:5px 11px;font-size:11px;color:var(--text1);cursor:pointer;font-family:inherit;transition:all .15s}
.csugg:hover{border-color:var(--accent);color:var(--blue)}
.spin{border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.fg{margin-bottom:12px}.fl{font-size:11px;color:var(--text1);display:block;margin-bottom:4px;font-weight:600}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
input[type=radio]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
/* Section label */
.sec{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;padding:8px 0 5px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
/* Dashboard compact table */
.dash-tbl{width:100%;font-size:12px;border-collapse:collapse}
.dash-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.dash-tbl td:first-child{color:var(--text0)}
.dash-tbl tr:last-child td{border-bottom:none}
.dash-tbl tr:hover td{background:var(--bg2);cursor:pointer}
/* Collapse section */
.collapse-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;cursor:pointer;user-select:none;margin-bottom:5px;transition:all .15s}
.collapse-hdr:active{background:var(--bg3)}
.collapse-hdr.open{border-radius:11px 11px 0 0}
.collapse-title{font-size:12px;font-weight:700;color:var(--text0);display:flex;align-items:center;gap:7px}
.collapse-arrow{color:var(--text2);font-size:12px;transition:transform .2s}
.collapse-arrow.open{transform:rotate(90deg)}
.collapse-body{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 11px 11px;padding:10px 13px;margin-bottom:8px}
</style>

// ── GOOGLE SHEET SYNC ────────────────────────────────────────────────────────
// Transport: JSONP for both GET and POST (no CORS preflight needed)
// Apps Script reads ?callback=xxx for JSONP, ?data=base64 for POST body

let _gsSyncTimer = null;
function debounceGsSync(){ clearTimeout(_gsSyncTimer); _gsSyncTimer=setTimeout(gsSync,2500); }

// ── JSONP GET ─────────────────────────────────────────────────────────────────
function gsJSONP(url){
  return new Promise((resolve, reject)=>{
    const cbName = '_mah_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = ()=>{ try{delete window[cbName]; script.remove();}catch(e){} };

    const timer = setTimeout(()=>{
      cleanup();
      reject(new Error('Timeout 12s — ตรวจสอบ URL และ Apps Script Deploy settings'));
    }, 12000);

    window[cbName] = function(data){
      clearTimeout(timer); cleanup(); resolve(data);
    };

    script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cbName;
    script.onerror = function(e){
      clearTimeout(timer); cleanup();
      reject(new Error('ไม่สามารถโหลด Script — URL ไม่ถูกต้อง หรือ Apps Script ยังไม่ได้ Deploy'));
    };
    document.head.appendChild(script);
  });
}

// ── JSONP POST (encode body as base64 in query string) ────────────────────────
function gsJSONP_POST(url, body){
  // Strategy: fetch with Content-Type text/plain avoids CORS preflight
  // Apps Script reads e.postData.contents in doPost()
  return new Promise((resolve, reject)=>{
    const jsonStr = JSON.stringify(body);
    const timer   = setTimeout(()=>reject(new Error('POST Timeout (20s)')), 20000);

    fetch(url, {
      method:  'POST',
      body:    jsonStr,
      // text/plain avoids preflight OPTIONS request
      headers: {'Content-Type': 'text/plain;charset=UTF-8'},
      redirect:'follow',
      mode:    'no-cors'  // prevents CORS error; response is opaque
    })
    .then(res=>{
      clearTimeout(timer);
      // no-cors gives opaque response (status=0, body unreadable)
      // We treat HTTP 0/200 as success for write operations
      resolve({success:true, note:'no-cors opaque response'});
    })
    .catch(err=>{
      clearTimeout(timer);
      // If fetch fails entirely, fallback to small JSONP GET
      if(jsonStr.length < 6000){
        gsFallbackPost(url, body).then(resolve).catch(reject);
      } else {
        reject(new Error('POST failed: ' + err.message));
      }
    });
  });
}

// Fallback for small payloads via JSONP GET
function gsFallbackPost(url, body){
  return new Promise((resolve, reject)=>{
    const cbName = '_mah_fb_' + Date.now();
    const script = document.createElement('script');
    const cleanup = ()=>{ try{delete window[cbName]; script.remove();}catch(e){} };
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Fallback timeout')); }, 12000);
    window[cbName] = d=>{ clearTimeout(timer); cleanup(); resolve(d); };
    let enc;
    try{ enc = btoa(unescape(encodeURIComponent(JSON.stringify(body)))); }
    catch(e){ cleanup(); reject(new Error('Encode: '+e.message)); return; }
    if(enc.length > 5000){ cleanup(); reject(new Error('Payload too large for GET')); return; }
    script.src = url+'?callback='+cbName+'&data='+encodeURIComponent(enc);
    script.onerror = ()=>{ clearTimeout(timer); cleanup(); reject(new Error('Script failed')); };
    document.head.appendChild(script);
  });
}

// ── enrichWO: เพิ่ม fallback fields เพื่อให้ Apps Script (legacy) ที่ไม่รู้จัก procs/cables 
//    ยังเก็บข้อมูลในรูปแบบ JSON string + text summary ที่อ่านได้ใน Google Sheet
function enrichWO(wo){
  if(!wo) return wo;
  const e = {...wo};
  try{
    // procs: stringify เป็น JSON เพื่อ Apps Script เก็บลง column generic 
    if(wo.procs && Object.keys(wo.procs).length){
      e.procs_json = JSON.stringify(wo.procs);
      const procNames = {vx2000pro:'Novastar VX2000Pro', cvtm:'Novastar CVT-M'};
      e.proc_summary = Object.entries(wo.procs).filter(([k,v])=>v>0)
        .map(([k,v])=>`${procNames[k]||k}:${v}`).join(', ');
    } else {
      e.procs_json = ''; e.proc_summary = '';
    }
    // cables: stringify เป็น JSON
    if(wo.cables && Object.keys(wo.cables).length){
      e.cables_json = JSON.stringify(wo.cables);
      e.cable_summary = Object.entries(wo.cables).filter(([k,v])=>v>0)
        .map(([k,v])=>{ const c=(typeof CABLE_DB!=='undefined'?CABLE_DB[k]:null); return `${c?.name||k}(${c?.spec||''}):${v}`; }).join(', ');
    } else {
      e.cables_json = ''; e.cable_summary = '';
    }
    // _confirmed: stringify เพื่อเก็บสถานะ (เสีย/ซ่อม/สูญหาย) ของแต่ละ cabinet
    if(wo._confirmed && Object.keys(wo._confirmed).length){
      e.confirmed_json = JSON.stringify(wo._confirmed);
    } else {
      e.confirmed_json = '';
    }
    // extras: stringify
    if(wo.extras && wo.extras.length){
      e.extras_json = JSON.stringify(wo.extras);
    } else {
      e.extras_json = '';
    }
  }catch(err){ console.warn('enrichWO:', err); }
  return e;
}

// ── enrichFC: คำนวณ status ของ FlightCase จาก status ของ cab ใน fc.cab_sns
//    เช่น: ทุก cab in_stock → status='in_stock'
//          บาง cab out      → status='partial'
//          ทุก cab out       → status='out'
//          มี cab repair      → status='repair' (override)
//    currentWO = ของ cab ตัวแรกที่ออกไป (ถ้าหลาย WO ปนกัน — บอกเป็น 'mixed')
function enrichFC(fc){
  if(!fc) return fc;
  const e = {...fc};
  try{
    const sns = Array.isArray(fc.cab_sns) ? fc.cab_sns : [];
    if(sns.length === 0){
      e.status = 'in_stock';
      e.n_out = 0;
      e.currentWO = '';
      return e;
    }
    let nOut = 0, nRepair = 0, nLost = 0;
    const wos = new Set();
    sns.forEach(sn=>{
      const c = CAB.find(cc=>cc.sn===sn);
      if(!c) return;
      if(c.status === 'out')     { nOut++;    if(c.currentWO) wos.add(c.currentWO); }
      else if(c.status === 'repair') nRepair++;
      else if(c.status === 'lost')   nLost++;
    });
    let status = 'in_stock';
    if(nRepair > 0)              status = 'repair';
    else if(nLost > 0)            status = 'lost';
    else if(nOut === sns.length) status = 'out';
    else if(nOut > 0)             status = 'partial';
    e.status   = status;
    e.n_out    = nOut;
    e.n_repair = nRepair;
    e.currentWO = wos.size === 1 ? [...wos][0] : (wos.size > 1 ? 'mixed' : '');
  }catch(err){ console.warn('enrichFC:', err); }
  return e;
}

// ── buildCloseWOPayload: builds a complete sync payload for close WO ────────
// Includes everything that changed when a WO was closed: WO itself, affected 
// CABs (returned to in_stock or marked as problem), affected ITEMS, recomputed
// CABLES/ACC totals, and FC status (recomputed from CAB state).
// 
// Why this exists: Previously close WO only pushed WO row. Sheet would show 
// WO=completed but CAB/FC still 'out' until next gsSync (up to 20s later). 
// In between, autoPull could fetch stale FC status back and revert local state.
function buildCloseWOPayload(updatedWO, extraSns){
  // extraSns: optional array of cab SNs that also changed (e.g. removed during edit)
  //           — needed so their FlightCases get recomputed/pushed too.
  const woSns = updatedWO.cabs || [];
  const allSns = Array.from(new Set([...woSns, ...(extraSns||[])]));
  const affectedIds = updatedWO.items || [];
  const cabsPayload = CAB.filter(c=>allSns.includes(c.sn))
    .map(c=>({sn:c.sn,status:c.status,cond:c.cond||'good',currentWO:c.currentWO||'',upd:c.upd||''}));
  const itemsPayload = ITEMS.filter(i=>affectedIds.includes(i.id))
    .map(i=>({id:i.id,status:i.status,cond:i.cond||'good',currentWO:i.currentWO||''}));
  // Recompute FC status for any FC that contains an affected cab (in WO or removed)
  const affectedFCs = [];
  if(typeof FC_DB !== 'undefined' && allSns.length){
    const snSet = new Set(allSns);
    FC_DB.forEach(fc=>{
      const sns = Array.isArray(fc.cab_sns) ? fc.cab_sns : [];
      if(sns.some(sn=>snSet.has(sn))){
        const enriched = enrichFC(fc);
        affectedFCs.push({
          fc:      enriched.fc,          // include identity so row never loses it
          fc_num:  enriched.fc_num,
          sz:      enriched.sz,
          n_cab:   enriched.n_cab,
          cab_sns: Array.isArray(enriched.cab_sns)?enriched.cab_sns:[],
          pdu_sns: Array.isArray(enriched.pdu_sns)?enriched.pdu_sns:[],
          note:    enriched.note||'',
          status:  enriched.status,
          n_out:   enriched.n_out,
          n_repair: enriched.n_repair,
          currentWO: enriched.currentWO
        });
      }
    });
  }
  const payload = {
    action: 'syncAll',
    user:   S.user||'',
    wo:     [enrichWO(updatedWO)],
    cabs:   cabsPayload,
    items:  itemsPayload,
    cables: Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
    acc:    ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0}))
  };
  if(affectedFCs.length) payload.fc = affectedFCs;
  return payload;
}

// ── pushCloseWO: send a close/open/edit WO sync as MULTIPLE small JSONP requests.
// The single-payload approach (buildCloseWOPayload) could exceed the ~8000 char
// URL limit when a WO had many cabs (e.g. 24+) plus FCs — the request would be
// rejected silently and the Sheet would never update. This splits it:
//   1. WO row (1 request)
//   2. CABs in chunks of 8
//   3. Items in chunks of 8
//   4. Cables + ACC totals (1 request)
//   5. FCs in chunks of 4
// Each chunk has retry. Returns a promise that resolves when all chunks done.
async function pushCloseWO(updatedWO, extraSns){
  if(!S.gsUrl) return;
  const woSns = updatedWO.cabs || [];
  const allSns = Array.from(new Set([...woSns, ...(extraSns||[])]));
  const affectedIds = updatedWO.items || [];

  const post = async (body, label)=>{
    let attempt=0;
    while(attempt<3){
      try{ await gsPostJSONP(S.gsUrl, body); return true; }
      catch(e){
        attempt++;
        console.warn('pushCloseWO '+label+' attempt '+attempt+':', e.message);
        if(attempt>=3){ notify('⚠️ Sync '+label+' ล้มเหลว','w'); return false; }
        await new Promise(r=>setTimeout(r,400));
      }
    }
  };

  const chunk = (arr,n)=>{ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; };

  // 1. WO row
  await post({action:'syncAll',user:S.user||'',wo:[enrichWO(updatedWO)]}, 'WO');

  // 2. CABs in chunks of 8
  const cabsPayload = CAB.filter(c=>allSns.includes(c.sn))
    .map(c=>({sn:c.sn,status:c.status,cond:c.cond||'good',currentWO:c.currentWO||'',upd:c.upd||''}));
  for(const cc of chunk(cabsPayload,8)){
    await post({action:'syncAll',user:S.user||'',cabs:cc}, 'CABs');
  }

  // 3. Items in chunks of 8
  const itemsPayload = ITEMS.filter(i=>affectedIds.includes(i.id))
    .map(i=>({id:i.id,status:i.status,cond:i.cond||'good',currentWO:i.currentWO||''}));
  for(const ic of chunk(itemsPayload,8)){
    await post({action:'syncAll',user:S.user||'',items:ic}, 'Items');
  }

  // 4. Cables + ACC totals
  await post({
    action:'syncAll',user:S.user||'',
    cables: Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
    acc:    ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0}))
  }, 'Cables/ACC');

  // 5. FCs in chunks of 4 (cab_sns arrays are large)
  const affectedFCs = [];
  if(typeof FC_DB !== 'undefined' && allSns.length){
    const snSet = new Set(allSns);
    FC_DB.forEach(fc=>{
      const sns = Array.isArray(fc.cab_sns) ? fc.cab_sns : [];
      if(sns.some(sn=>snSet.has(sn))){
        const e = enrichFC(fc);
        affectedFCs.push({
          fc:e.fc, fc_num:e.fc_num, sz:e.sz, n_cab:e.n_cab,
          cab_sns:Array.isArray(e.cab_sns)?e.cab_sns:[],
          pdu_sns:Array.isArray(e.pdu_sns)?e.pdu_sns:[],
          note:e.note||'', status:e.status, n_out:e.n_out,
          n_repair:e.n_repair, currentWO:e.currentWO
        });
      }
    });
  }
  for(const fcc of chunk(affectedFCs,4)){
    await post({action:'syncAll',user:S.user||'',fc:fcc}, 'FCs');
  }
  return true;
}

async function gsSync(){
  if(!S.gsUrl) return;
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    // Build set of cabs to push: active WO cabs + non-good cabs + recently-touched (in S._dirty)
    if(!S._dirtyCabSns) S._dirtyCabSns = new Set();
    if(!S._dirtyItemIds) S._dirtyItemIds = new Set();
    
    const activeCabSns = new Set([...S._dirtyCabSns]);
    WO.filter(w=>w.status==='active').forEach(w=>(w.cabs||[]).forEach(s=>activeCabSns.add(s)));
    CAB.forEach(c=>{
      if(c.status!=='in_stock'||c.cond!=='good') activeCabSns.add(c.sn);
    });
    const affectedCabs = CAB.filter(c=>activeCabSns.has(c.sn))
      .map(c=>({sn:c.sn,status:c.status,cond:c.cond||'good',currentWO:c.currentWO||'',upd:c.upd||''}));

    const activeItemIds = new Set([...S._dirtyItemIds]);
    WO.filter(w=>w.status==='active').forEach(w=>(w.items||[]).forEach(id=>activeItemIds.add(id)));
    ITEMS.forEach(i=>{
      if(i.status!=='in_stock') activeItemIds.add(i.id);
    });
    const affectedItems = ITEMS.filter(i=>activeItemIds.has(i.id))
      .map(i=>({id:i.id,status:i.status,cond:i.cond||'good',currentWO:i.currentWO||''}));

    // Compute affected FlightCases — any FC whose cab is in dirty set
    const affectedFCs = [];
    if(typeof FC_DB !== 'undefined'){
      const dirtySet = S._dirtyCabSns || new Set();
      // Build active WO set for cross-check
      const activeWoIds = new Set(WO.filter(w=>w.status==='active').map(w=>w.id));
      // Build "cab → which WO it should belong to" map (only active WOs)
      const cabToActiveWO = new Map();
      WO.filter(w=>w.status==='active').forEach(w=>{
        (w.cabs||[]).forEach(sn=>cabToActiveWO.set(sn, w.id));
      });
      
      FC_DB.forEach(fc=>{
        const sns = Array.isArray(fc.cab_sns) ? fc.cab_sns : [];
        if(sns.length === 0) return;
        const enriched = enrichFC(fc);
        // Include FC if ANY of:
        //   1. Has a cab in dirty set (changed this session)
        //   2. Has out/repair/partial status (not in_stock — needs to be tracked)
        //   3. Has currentWO pointing to a non-active WO (stale — should be cleared)
        const hasDirty = sns.some(sn=>dirtySet.has(sn));
        const isActive = enriched.status !== 'in_stock';
        const hasStaleCurrentWO = enriched.currentWO && enriched.currentWO !== 'mixed' && !activeWoIds.has(enriched.currentWO);
        if(hasDirty || isActive || hasStaleCurrentWO){
          affectedFCs.push(enriched);
        }
      });
    }

    // Push status changes (cabs/items/cables/acc/fc) first — small payload
    const statusPayload = {
      action: 'syncAll',
      user:   S.user||'',
      cabs:   affectedCabs,
      items:  affectedItems,
      cables: Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
      acc:    ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0})),
      ts:     new Date().toISOString()
    };
    // Include FC status patch only if there are affected ones (keeps payload small)
    if(affectedFCs.length){
      statusPayload.fc = affectedFCs.map(f=>({
        fc:      f.fc,        // identity — prevents row losing fc label
        fc_num:  f.fc_num,
        status:  f.status,
        n_out:   f.n_out,
        n_repair: f.n_repair,
        currentWO: f.currentWO
      }));
    }
    await gsPostJSONP(S.gsUrl, statusPayload);
    
    // Push Work Orders: 1 at a time with retry (each WO can have 48+ cabs → URL near limit)
    if(WO.length){
      for(let i=0;i<WO.length;i++){
        let attempt=0;
        while(attempt<3){
          try{ await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',wo:[enrichWO(WO[i])]}); break; }
          catch(e){
            attempt++;
            if(attempt>=3){ console.warn('WO sync skip:',WO[i].id,e.message); break; }
            await new Promise(r=>setTimeout(r,400));
          }
        }
        await new Promise(r=>setTimeout(r,150));
      }
    }
    
    S.lastSync = new Date().toISOString();
    S.gsStatus='ok';
    // Clear dirty sets after successful push
    S._dirtyCabSns = new Set();
    S._dirtyItemIds = new Set();
  }catch(e){
    S.gsStatus='error';
    console.warn('gsSync:', e.message);
  }
  updateSyncBadge();
}

// ── gsPushDirty: "Push ล่าสุด" — pushes ONLY what changed (active WOs + their
// cabs/items/FCs + any dirty cabs), each in safe small chunks via pushCloseWO.
// Does NOT pull, does NOT push the entire 840-cab database. Fast + safe.
async function gsPushDirty(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  notify('📤 กำลัง Push ล่าสุด...','i');
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    // Reconcile first so local state is correct before pushing
    try{ reconcileFromWO(); }catch(e){}

    // Push every WO that is active OR was recently closed (status completed/failed),
    // plus any WO touching dirty cabs. Using pushCloseWO handles WO+cabs+items+FC+cables.
    const dirtySet = S._dirtyCabSns || new Set();
    const wosToPush = WO.filter(w=>
      w.status==='active' ||
      w.status==='completed' ||
      w.status==='failed' ||
      (w.cabs||[]).some(sn=>dirtySet.has(sn))
    );

    if(wosToPush.length===0){
      // No WO changes — just push dirty cabs + their FCs directly
      const dirtyCabs = CAB.filter(c=>dirtySet.has(c.sn))
        .map(c=>({sn:c.sn,status:c.status,cond:c.cond||'good',currentWO:c.currentWO||'',upd:c.upd||''}));
      if(dirtyCabs.length){
        for(let i=0;i<dirtyCabs.length;i+=8){
          await gsPostJSONP(S.gsUrl,{action:'syncAll',user:S.user||'',cabs:dirtyCabs.slice(i,i+8)});
        }
      }
      notify('✅ Push ล่าสุดเสร็จ ('+dirtyCabs.length+' cab)','s');
    } else {
      let n=0;
      for(const w of wosToPush){
        await pushCloseWO(w);
        n++;
        notify('📤 WO '+n+'/'+wosToPush.length,'i');
      }
      notify('✅ Push ล่าสุดเสร็จ ('+n+' ใบงาน)','s');
    }

    // Always push cable + acc totals (small)
    await gsPostJSONP(S.gsUrl,{
      action:'syncAll',user:S.user||'',
      cables: Object.entries(CABLES).map(([k,v])=>({key:k,out:v.out||0,repair:v.repair||0})),
      acc:    ACC.map(a=>({id:a.id,out:a.out||0,repair:a.repair||0}))
    });

    S.lastSync=new Date().toISOString();
    S.gsStatus='ok';
    S._dirtyCabSns=new Set();
    S._dirtyItemIds=new Set();
  }catch(e){
    S.gsStatus='error';
    notify('❌ Push ล่าสุดล้มเหลว: '+e.message,'e');
    console.warn('gsPushDirty:', e.message);
  }
  updateSyncBadge();
}

  S.gsUrl = url;
  S.gsStatus = 'syncing'; updateSyncBadge(); render();
  try{

    notify('❌ ' + e.message, 'e');
  }
  updateSyncBadge(); render();
}

async function gsPushAll(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  notify('📤 กำลัง Push (Full Database)...','i');
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    // ── Step 0: Reconcile local state from WO (source of truth) ─────────────
    // Critical: without this, if CAB.currentWO is stale (still pointing to a completed WO),
    // we'd push that stale state to the Sheet → FC status would be wrong.
    try{
      reconcileFromWO();
      notify('🔄 Reconciled local state from WO','i');
    }catch(e){ console.warn('reconcile @ pushAll:', e); }

    // ── Step 1: Initialize sheets ───────────────────────────────────────────
    notify('🆕 สร้าง/ตรวจสอบ Sheets...','i');
    const initRes = await gsJSONP(S.gsUrl + '?action=init');
    if(!initRes || !initRes.success) throw new Error('Init failed: '+JSON.stringify(initRes));

    const CHUNK = 20; // 20 items per chunk to fit 8KB URL

    // ── Step 2: Push Cabinets (840 items, ~42 chunks) ───────────────────────
    const cabAll = CAB.map(c=>({sn:c.sn,status:c.status,cond:c.cond||'good',currentWO:c.currentWO||'',sz:c.sz,fc:c.fc,pdu:c.pdu||'',note:c.note||''}));
    for(let i=0;i<cabAll.length;i+=CHUNK){
      const chunk = cabAll.slice(i,i+CHUNK);
      let attempt=0;
      while(attempt<3){
        try{ await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',cabs:chunk}); break; }
        catch(e){ attempt++; if(attempt>=3) throw new Error('Cabinet push @ '+i+': '+e.message);
          await new Promise(r=>setTimeout(r,500));
        }
      }
      notify('📤 Cabinets '+Math.min(i+CHUNK,cabAll.length)+'/'+cabAll.length,'i');
      await new Promise(r=>setTimeout(r,200));
    }

    // ── Step 3: Push Structure (Hanging Bars) ───────────────────────────────
    const structureAll = ITEMS.filter(i=>i.group==='structure')
      .map(i=>({id:i.id,group:i.group,sn:i.sn||i.id,spec:i.spec||'',status:i.status,cond:i.cond||'good',currentWO:i.currentWO||''}));
    for(let i=0;i<structureAll.length;i+=CHUNK){
      const chunk = structureAll.slice(i,i+CHUNK);
      let attempt=0;
      while(attempt<3){
        try{ await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',structure:chunk}); break; }
        catch(e){ attempt++; if(attempt>=3) throw new Error('Structure push @ '+i+': '+e.message);
          await new Promise(r=>setTimeout(r,500));
        }
      }
      notify('📤 Structure '+Math.min(i+CHUNK,structureAll.length)+'/'+structureAll.length,'i');
      await new Promise(r=>setTimeout(r,200));
    }

    // ── Step 4: Push Spare Items (smaller chunk for safety) ────────────────
    const spareAll = ITEMS.filter(i=>i.group!=='structure')
      .map(i=>({id:i.id,group:i.group,sn:i.sn||i.id,spec:i.spec||'',status:i.status,cond:i.cond||'good',currentWO:i.currentWO||''}));
    const SPARE_CHUNK = 10;
    for(let i=0;i<spareAll.length;i+=SPARE_CHUNK){
      const chunk = spareAll.slice(i,i+SPARE_CHUNK);
      let attempt=0; const maxAttempts=3;
      while(attempt<maxAttempts){
        try{
          await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',spare:chunk});
          break;
        }catch(e){
          attempt++;
          if(attempt>=maxAttempts){
            // Final retry: split chunk in half
            try{
              const half = Math.ceil(chunk.length/2);
              await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',spare:chunk.slice(0,half)});
              await new Promise(r=>setTimeout(r,300));
              await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',spare:chunk.slice(half)});
              break;
            }catch(e2){
              throw new Error('Spare push @ index '+i+': '+e2.message);
            }
          }
          await new Promise(r=>setTimeout(r,500));
        }
      }
      notify('📤 Spare '+Math.min(i+SPARE_CHUNK,spareAll.length)+'/'+spareAll.length,'i');
      await new Promise(r=>setTimeout(r,200));
    }

    // ── Step 5: Push Cables + Accessories ───────────────────────────────────
    notify('📤 Cables + Accessories...','i');
    await gsPostJSONP(S.gsUrl, {
      action:'syncAll', user:S.user||'',
      cables: Object.entries(CABLES).map(([k,v])=>({key:k,name:CABLE_DB[k]?.name||k,spec:CABLE_DB[k]?.spec||'',total:CABLE_DB[k]?.total||0,out:v.out||0,repair:v.repair||0})),
      acc:    ACC.map(a=>({id:a.id,name:a.name,spec:a.spec||'',qty:a.qty||0,out:a.out||0,repair:a.repair||0}))
    });

    // ── Step 6: Push Flight Cases (smallest chunk: cab_sns can be 24 SNs each) ─
    const FC_CHUNK = 6;
    for(let i=0;i<FC_DB.length;i+=FC_CHUNK){
      const chunk = FC_DB.slice(i,i+FC_CHUNK).map(enrichFC);
      let attempt=0;
      while(attempt<3){
        try{ await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',fc:chunk}); break; }
        catch(e){
          attempt++;
          if(attempt>=3){
            // Last resort: send 1 at a time
            try{
              for(const fc of chunk){
                await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',fc:[fc]});
                await new Promise(r=>setTimeout(r,200));
              }
              break;
            }catch(e2){
              throw new Error('FC push @ index '+i+': '+e2.message);
            }
          }
          await new Promise(r=>setTimeout(r,500));
        }
      }
      notify('📤 Flight Cases '+Math.min(i+FC_CHUNK,FC_DB.length)+'/'+FC_DB.length,'i');
      await new Promise(r=>setTimeout(r,300));
    }

    // ── Step 7: Push Work Orders (1 at a time — handles WOs with 48+ cabs) ─
    if(WO.length){
      for(let i=0;i<WO.length;i++){
        let attempt=0;
        while(attempt<3){
          try{ await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',wo:[enrichWO(WO[i])]}); break; }
          catch(e){
            attempt++;
            if(attempt>=3) throw new Error('WO push @ '+WO[i].id+': '+e.message);
            await new Promise(r=>setTimeout(r,500));
          }
        }
        await new Promise(r=>setTimeout(r,200));
      }
    }

    S.lastSync = new Date().toISOString();
    S.gsStatus='ok';
    notify(`✅ Push ครบ! Cabinets ${cabAll.length} + Structure ${structureAll.length} + Spare ${spareAll.length} + FC ${FC_DB.length}`,'s');
  }catch(e){
    S.gsStatus='error';
    notify('❌ Push: '+e.message,'e');
    console.error(e);
  }
  updateSyncBadge();
}

// New: POST-via-JSONP-GET — encode body as base64 in URL param, get real response
function gsPostJSONP(url, body){
  return new Promise((resolve, reject)=>{
    const cbName = '_mah_post_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = ()=>{ try{delete window[cbName]; script.remove();}catch(e){} };
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('POST timeout 25s')); }, 25000);
    window[cbName] = function(data){
      clearTimeout(timer); cleanup();
      if(data && data.success===false) reject(new Error(data.error||'Server error'));
      else resolve(data);
    };
    let enc;
    try{
      enc = btoa(unescape(encodeURIComponent(JSON.stringify(body))));
    }catch(e){ cleanup(); reject(new Error('Encode: '+e.message)); return; }
    const finalUrl = url + '?callback='+cbName+'&data='+encodeURIComponent(enc);
    if(finalUrl.length > 8000){
      cleanup();
      reject(new Error('Payload too large for one request (' + finalUrl.length + ' chars). Need smaller chunks.'));
      return;
    }
    script.src = finalUrl;
    script.onerror = ()=>{ clearTimeout(timer); cleanup(); reject(new Error('Network error or invalid URL')); };
    document.head.appendChild(script);
  });
}

async function gsPullAll(){
  if(!S.gsUrl){ notify('ใส่ URL ก่อน','w'); return; }
  notify('📥 กำลัง Pull...','i');
  S.gsStatus='syncing'; updateSyncBadge();
  try{
    const data = await gsJSONP(S.gsUrl + '?action=getAll', 30000);
    if(!data || !data.success) throw new Error(data?.error || 'Pull failed');
    if(data.data?.cabinets && data.data.cabinets.length){
      const map = {};
      data.data.cabinets.forEach(c=>{ map[c.sn]=c; });
      CAB = CAB.map(c=>{
        if(map[c.sn]){
          const g = map[c.sn];
          return {...c, status:g.status||c.status, cond:g.cond||c.cond, currentWO:g.currentWO||null};
        }
        return c;
      });
    }
    // Merge structure (Hanging Bars) + spare items from v6 split sheets
    const allRemoteItems = [
      ...(data.data?.structure||[]),
      ...(data.data?.spare||[]),
      ...(data.data?.items||[]) // backward compat with v5
    ];
    if(allRemoteItems.length){
      const imap = {};
      allRemoteItems.forEach(i=>{ if(i.id) imap[i.id]=i; });
      ITEMS = ITEMS.map(i=>{
        if(imap[i.id]){
          const g = imap[i.id];
          return {...i, status:g.status||i.status, cond:g.cond||i.cond, currentWO:g.currentWO||null};
        }
        return i;
      });
    }
    if(data.data?.cables){
      data.data.cables.forEach(c=>{
        if(CABLES[c.key]) CABLES[c.key]={...CABLES[c.key],out:c.out||0,repair:c.repair||0};
      });
    }
    if(data.data?.acc){
      data.data.acc.forEach(a=>{
        ACC=ACC.map(x=>x.id===a.id?{...x,out:a.out||0,repair:a.repair||0}:x);
      });
    }
    if(data.data?.workOrders){
      // ── SMART MERGE: ป้องกัน spec/procs/cables/_confirmed หายเมื่อ Apps Script ส่ง WO กลับมาขาด field
      // Strategy: เชื่อ status/cabs/items จาก remote (เพราะอาจมีคนอื่นแก้),
      //           แต่ field ที่ remote ขาดหรือว่าง → ใช้ local เป็น fallback
      const remoteWOs = data.data.workOrders || [];
      const localMap = {};
      WO.forEach(w=>{ if(w&&w.id) localMap[w.id]=w; });

      // Fields ที่ต้อง preserve จาก local ถ้า remote ขาด/ว่าง
      const PRESERVE_FIELDS = ['procs','cables','items','extras','accessories','_confirmed','notes','loc','resp','start_date','end_date','name','createdAt'];
      const isEmpty = (v)=> v==null || (typeof v==='object' && !Array.isArray(v) && Object.keys(v).length===0) || (Array.isArray(v) && v.length===0) || v==='';

      const mergedWO = remoteWOs.map(r=>{
        const local = localMap[r.id];
        if(!local) {
          // ใหม่ — ลองกู้ procs จาก procs_json ถ้ามี
          if(r.procs_json && isEmpty(r.procs)){
            try{ r.procs = JSON.parse(r.procs_json); }catch(e){}
          }
          if(r.cables_json && isEmpty(r.cables)){
            try{ r.cables = JSON.parse(r.cables_json); }catch(e){}
          }
          return r;
        }
        // มีทั้ง local และ remote — merge แบบฉลาด
        const merged = {...local, ...r};
        PRESERVE_FIELDS.forEach(f=>{
          if(isEmpty(r[f]) && !isEmpty(local[f])) merged[f] = local[f];
        });
        // ลองกู้ procs/cables จาก *_json fallback
        if(isEmpty(merged.procs) && r.procs_json){
          try{ merged.procs = JSON.parse(r.procs_json); }catch(e){}
        }
        if(isEmpty(merged.cables) && r.cables_json){
          try{ merged.cables = JSON.parse(r.cables_json); }catch(e){}
        }
        return merged;
      });

      // คงไว้ซึ่ง local WO ที่ remote ยังไม่มี (กรณี optimistic insert ที่ยังไม่ sync)
      const remoteIds = new Set(remoteWOs.map(w=>w.id));
      const localOnly = WO.filter(w=>w&&w.id&&!remoteIds.has(w.id));
      WO = [...mergedWO, ...localOnly];
    }
    // ── reconcile: ใช้ WO เป็น source of truth แก้ CAB/ITEMS/CABLES/ACC ที่อาจ desync
    reconcileFromWO();
    S.lastSync = new Date().toISOString();
    await sv();
    S.gsStatus='ok'; notify('✅ Pull สำเร็จ','s'); render();
  }catch(e){
    S.gsStatus='error'; notify('❌ Pull: ' + e.message,'e');
  }
  updateSyncBadge();
}

function updateSyncBadge(){
  const b = document.querySelector('.sync-badge');
  if(!b) return;
  if(!S.gsUrl){ b.innerHTML='☁️ Local'; b.style.color='var(--text1)'; b.style.borderColor='var(--border)'; return; }
  const states = {
    syncing: {text:'🔄 Syncing',  color:'var(--yellow)'},
    ok:      {text:'● GSheet',   color:'var(--green)'},
    error:   {text:'● Sync Err', color:'var(--red)'},
    idle:    {text:'● GSheet',   color:'var(--green)'},
  };
  const st = states[S.gsStatus] || states.idle;
  b.innerHTML = st.text;
  b.style.color = st.color;
  b.style.borderColor = st.color.replace('var(','rgba(').replace(')',', .4)').replace('--yellow','210,153,34').replace('--green','63,185,80').replace('--red','248,81,73');
}


// ── INIT FROM SEED ───────────────────────────────────────────────────────────
function expandMods(m){
  if(Array.isArray(m)&&m.length===2&&typeof m[1]==='number'){
    const base=m[0],n=m[1];
    return Array.from({length:n},(_,i)=>`${base}-${i+1}`);
  }
  return Array.isArray(m)?m:[];
}

function initSeed(){
  const now=new Date().toISOString();
  CAB=CAB_SEED.map((r,i)=>({
    id:i+1,fc:r[0],sz:SIZES[r[1]||0],sn:r[2],pdu:r[3],
    mods:expandMods(r[4]),cond:r[5]||'good',note:r[6]||'',model:MODELS[r[7]||0],
    status:'in_stock',currentWO:null,upd:now
  }));
  ITEMS=[];
  Object.values(ITEM_DB).flat().forEach(r=>{
    ITEMS.push({id:r[0],group:r[1],subgroup:r[2],sn:r[3],spec:r[4],note:r[5],
      status:r[6]||'in_stock',cond:'good',currentWO:null,upd:now});
  });
  CABLES={};
  Object.entries(CABLE_DB).forEach(([k,v])=>{CABLES[k]={...v,out:0,repair:0};});
  ACC=ACC_DB.map(a=>({...a}));
}

async function loadData(){
  try{
    let cd,id,cbd,ad,wd;
    if(window.storage){
      const r1=await window.storage.get('mah_v8_cab');
      const r2=await window.storage.get('mah_v8_items');
      const r3=await window.storage.get('mah_v8_cables');
      const r4=await window.storage.get('mah_v8_acc');
      const r5=await window.storage.get('mah_v8_wo');
      cd=r1?.value;id=r2?.value;cbd=r3?.value;ad=r4?.value;wd=r5?.value;
    } else {
      const p=localStorage.getItem('mah_v8');
      if(p){const j=JSON.parse(p);cd=JSON.stringify(j.cab);id=JSON.stringify(j.items);cbd=JSON.stringify(j.cables);ad=JSON.stringify(j.acc);wd=JSON.stringify(j.wo);}
    }
    if(cd)CAB=JSON.parse(cd); else{initSeed();await sv();return done();}
    if(id)ITEMS=JSON.parse(id); else{ITEMS=[];Object.values(ITEM_DB).flat().forEach(r=>{ITEMS.push({id:r[0],group:r[1],subgroup:r[2],sn:r[3],spec:r[4],note:r[5],status:r[6]||'in_stock',cond:'good',currentWO:null,upd:new Date().toISOString()});});}
    if(cbd){CABLES=JSON.parse(cbd);Object.entries(CABLE_DB).forEach(([k,v])=>{if(!CABLES[k])CABLES[k]={...v,out:0,repair:0};});}
    else{CABLES={};Object.entries(CABLE_DB).forEach(([k,v])=>{CABLES[k]={...v,out:0,repair:0};});}
    if(ad)ACC=JSON.parse(ad); else ACC=ACC_DB.map(a=>({...a}));
    if(wd)WO=JSON.parse(wd); else WO=[];
  }catch(e){initSeed();}
  // ── reconcile after load: ถ้า local state มี desync จาก crash/old data — fix ทันที
  try{ reconcileFromWO(); }catch(e){ console.warn('reconcile@load:',e); }
  done();
}

function done(){
  S.loading=false;
  // Load GS URL from storage
  try{
    if(window.storage){
      window.storage.get('mah_v8_cfg').then(r=>{if(r){const cfg=JSON.parse(r.value);S.gsUrl=cfg.gsUrl||'';S.user=cfg.user||'';updateSyncBadge();}}).catch(()=>{});
    } else {
      const cfg=JSON.parse(localStorage.getItem('mah_v8_cfg')||'{}');
      S.gsUrl=cfg.gsUrl||'';
      S.user=cfg.user||'';
    }
  }catch(e){}
  render();
  // Show version briefly so user knows which build is loaded
  setTimeout(()=>notify('🚀 '+APP_VERSION,'i'), 800);
}

// ── HELPERS ──
function notify(m,t='i'){
  const cls={s:'n-s',e:'n-e',w:'n-w',i:'n-i'}[t]||'n-i';
  const el=document.createElement('div');el.className='nn '+cls;el.textContent=m;
  document.getElementById('nw').appendChild(el);
  // Errors stay 10s so user can read; others 3.3s
  const duration = (t==='e') ? 10000 : 3300;
  setTimeout(()=>el.remove(),duration);
  // Log errors to console for debugging
  if(t==='e') console.error('[notify]',m);
  // Click to dismiss
  el.addEventListener('click',()=>el.remove());
}
function bdg(c,l){return`<span class="bx ${c}">${l}</span>`;}
function updCab(sn,u){CAB=CAB.map(c=>c.sn===sn?{...c,...u,upd:new Date().toISOString()}:c);sv();}
function updItem(id,u){ITEMS=ITEMS.map(i=>i.id===id?{...i,...u,upd:new Date().toISOString()}:i);sv();}
function updAcc(id,u){ACC=ACC.map(a=>a.id===id?{...a,...u}:a);sv();}
function updCable(key,u){CABLES[key]={...CABLES[key],...u};sv();}

// ── reconcileFromWO: ใช้ WO list (active) เป็น source of truth ปรับ CAB/ITEMS/CABLES/ACC ─
// เรียกหลังจาก Pull เสร็จ — แก้ปัญหากรณี Apps Script ส่ง CAB rows กลับมาเป็น in_stock 
// ทั้งที่จริงๆ มี active WO ใช้งานอยู่ → counter dashboard เด้งกลับเป็น 760/760
function reconcileFromWO(){
  const activeWOs = WO.filter(w=>w && w.status==='active');
  
  // 1. CAB: cab ใน active WO → status='out', currentWO=wo.id
  const cabToWO = {}; // sn → wo.id
  activeWOs.forEach(w=>{ (w.cabs||[]).forEach(sn=>{ cabToWO[sn] = w.id; }); });
  
  let cabChanged=false;
  if(!S._dirtyCabSns) S._dirtyCabSns = new Set();
  CAB = CAB.map(c=>{
    if(cabToWO[c.sn]){
      // ต้อง out + currentWO ตรงกับ WO
      if(c.status!=='out' || c.currentWO!==cabToWO[c.sn]){
        cabChanged=true;
        S._dirtyCabSns.add(c.sn); // mark dirty so gsSync will push it AND its FC
        return {...c, status:'out', currentWO:cabToWO[c.sn]};
      }
    } else {
      // ไม่ได้อยู่ใน active WO ใดๆ — ถ้า status เป็น 'out' แต่ไม่มี WO อ้างอิงแล้ว → คืนเข้าคลัง (เฉพาะกรณี currentWO เป็นของ WO ที่ปิดไปแล้ว)
      if(c.status==='out' && c.currentWO){
        const owner = WO.find(w=>w.id===c.currentWO);
        if(!owner || owner.status!=='active'){
          cabChanged=true;
          S._dirtyCabSns.add(c.sn); // mark dirty so gsSync will push CAB + FC update
          return {...c, status:'in_stock', currentWO:null};
        }
      }
    }
    return c;
  });
  
  // 2. ITEMS: เหมือนกับ CAB — items ใน active WO → out
  const itemToWO = {};
  activeWOs.forEach(w=>{ (w.items||[]).forEach(id=>{ itemToWO[id] = w.id; }); });
  
  let itemChanged=false;
  ITEMS = ITEMS.map(it=>{
    if(itemToWO[it.id]){
      if(it.status!=='out' || it.currentWO!==itemToWO[it.id]){
        itemChanged=true;
        return {...it, status:'out', currentWO:itemToWO[it.id]};
      }
    } else {
      if(it.status==='out' && it.currentWO){
        const owner = WO.find(w=>w.id===it.currentWO);
        if(!owner || owner.status!=='active'){
          itemChanged=true;
          return {...it, status:'in_stock', currentWO:null};
        }
      }
    }
    return it;
  });
  
  // 3. CABLES.out: นับจากผลรวม cables ของทุก active WO
  const cableTotals = {};
  activeWOs.forEach(w=>{
    Object.entries(w.cables||{}).forEach(([k,v])=>{
      if(v>0) cableTotals[k] = (cableTotals[k]||0) + v;
    });
  });
  let cableChanged=false;
  Object.keys(CABLES).forEach(k=>{
    const desired = cableTotals[k]||0;
    if((CABLES[k].out||0) !== desired){
      cableChanged=true;
      CABLES[k] = {...CABLES[k], out:desired};
    }
  });
  
  // 4. ACC (processor): นับจากผลรวม procs ของทุก active WO
  const PROC_ACC_MAP = {vx2000pro:'PROC-01', cvtm:'PROC-02'};
  const procTotals = {}; // accId → qty
  activeWOs.forEach(w=>{
    Object.entries(w.procs||{}).forEach(([procId,v])=>{
      const accId = PROC_ACC_MAP[procId];
      if(accId && v>0) procTotals[accId] = (procTotals[accId]||0) + v;
    });
  });
  let accChanged=false;
  ACC = ACC.map(a=>{
    if(procTotals[a.id]!==undefined){
      if((a.out||0) !== procTotals[a.id]){
        accChanged=true;
        return {...a, out:procTotals[a.id]};
      }
    } else if(a.group==='processor' && (a.out||0)>0){
      // processor ที่ไม่มีในใบงาน active ใดๆ → reset out=0
      accChanged=true;
      return {...a, out:0};
    }
    return a;
  });
  
  return cabChanged||itemChanged||cableChanged||accChanged;
}

function stats(){
  const c1000=CAB.filter(c=>c.sz==='500x1000mm'), c500=CAB.filter(c=>c.sz==='500x500mm');
  const hbL=ITEMS.filter(i=>i.subgroup==='Hanging Bar DBmk2-1000mm');
  const hbS=ITEMS.filter(i=>i.subgroup==='Hanging Bar RS-500mm');
  const proc=ACC.filter(a=>a.group==='processor');
  return{
    cab:{total:CAB.length,in:CAB.filter(c=>c.status==='in_stock').length,out:CAB.filter(c=>c.status==='out').length,repair:CAB.filter(c=>c.status==='repair').length,dmg:CAB.filter(c=>c.cond==='damaged').length},
    c1000:{total:c1000.length,in:c1000.filter(c=>c.status==='in_stock').length,out:c1000.filter(c=>c.status==='out').length},
    c500:{total:c500.length,in:c500.filter(c=>c.status==='in_stock').length,out:c500.filter(c=>c.status==='out').length},
    hbL:{total:hbL.length,in:hbL.filter(i=>i.status==='in_stock').length,out:hbL.filter(i=>i.status==='out').length},
    hbS:{total:hbS.length,in:hbS.filter(i=>i.status==='in_stock').length,out:hbS.filter(i=>i.status==='out').length},
    cables:Object.fromEntries(Object.entries(CABLES).map(([k,v])=>[k,{total:v.total,in:v.total-v.out-v.repair,out:v.out,repair:v.repair}])),
    activeWO:WO.filter(w=>w.status==='active').length,
    mods:CAB.reduce((a,c)=>a+(c.mods||[]).length,0),
    proc:{total:proc.reduce((a,p)=>a+(p.qty||0),0),out:proc.reduce((a,p)=>a+(p.out||0),0),items:proc},
  };
}

function findScan(q){
  const u=q.trim().toUpperCase().replace(/\s+/g,' ');
  // 1. FC: match ILP2512166-FC001 | FC001 | 1/156 | FC1
  const fcMatch = FC_DB.find(f=>{
    const id='ILP2512166-FC'+f.fc_num;
    return id===u ||
      ('FC'+f.fc_num)===u ||
      ('FC'+parseInt(f.fc_num,10))===u ||
      f.fc.toUpperCase()===u ||
      f.fc===q.trim();
  });
  if(fcMatch) return {type:'fc', data:fcMatch};
  // 2. Cabinet SN / PDU / Module
  const cab=CAB.find(c=>
    c.sn.toUpperCase()===u ||
    c.sn.toUpperCase().includes(u) ||
    (c.pdu||'').toUpperCase().includes(u) ||
    (c.mods||[]).some(m=>m.toUpperCase().includes(u))
  );
  if(cab) return {type:'cab', data:cab};
  // 3. Cable: match MAH-CBL-MAIN_POWER | MAIN_POWER | etc
  //    Cable QR format: MAH-CBL-<KEY>  (e.g. MAH-CBL-MAIN_POWER)
  if(u.startsWith('MAH-CBL-') || u.startsWith('CBL-')){
    const key = u.replace(/^MAH-/,'').replace(/^CBL-/,'').toLowerCase();
    if(CABLE_DB && CABLE_DB[key]){
      return {type:'cable', data:{key, ...CABLE_DB[key]}};
    }
  }
  // Also match raw cable key directly
  if(typeof CABLE_DB !== 'undefined'){
    const cableKey = Object.keys(CABLE_DB).find(k=>k.toUpperCase()===u);
    if(cableKey) return {type:'cable', data:{key:cableKey, ...CABLE_DB[cableKey]}};
  }
  // 4. Processor unit: MAH-PROC-01-01 → ACC[PROC-01] unit #01
  //    Format: MAH-PROC-<NN>-<UU>  (NN = group, UU = unit index, both 2-digit)
  if(u.startsWith('MAH-PROC-') || u.startsWith('PROC-')){
    const m = u.match(/PROC-(\d{1,2})-(\d{1,2})/);
    if(m){
      const accId = 'PROC-' + m[1].padStart(2,'0');
      const unit  = parseInt(m[2],10);
      const acc   = ACC.find(a=>a.id===accId);
      if(acc && unit>=1 && unit<=(acc.qty||0)){
        return {type:'proc', data:{accId, unit, name:acc.name, spec:acc.spec, qty:acc.qty, out:acc.out||0, _scanned:`${accId}-${m[2].padStart(2,'0')}`}};
      }
    }
  }
  // 5. Serial item (structure HB, spare modules, recv card, hub, psu, etc)
  const item=ITEMS.find(i=>i.sn&&i.sn.toUpperCase().includes(u));
  if(item) return {type:'item', data:item};
  return null;
}

// ── SCANNER ──
let _scanStream=null, _scanRAF=null, _zxCtrl=null;

function stopScan(){
  S.scanOn=false;
  if(_scanRAF){cancelAnimationFrame(_scanRAF);_scanRAF=null;}
  if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}
  if(_zxCtrl){try{_zxCtrl.stop();}catch(e){} _zxCtrl=null;}
}

function startScan(vid, cb){
  S.scanOn=true; render();
  setTimeout(async()=>{
    const v=document.getElementById(vid);
    if(!v){stopScan();render();return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
      });
      _scanStream=stream;
      v.srcObject=stream;
      v.setAttribute('playsinline','');
      v.muted=true;
      await v.play();

      // Try ZXing (Code128 + QR + all barcodes)
      if(window.ZXingBrowser && !window._zxF){
        try{
          const reader=new window.ZXingBrowser.BrowserMultiFormatReader();
          let zxLast='', zxLastTime=0;
          reader.decodeFromVideoDevice(null,v,(result,err)=>{
            if(result && S.scanOn){
              const txt=result.getText();
              const now=Date.now();
              // Debounce same code within 1.5s; allow different code immediately.
              if(txt!==zxLast || (now-zxLastTime)>1500){
                zxLast=txt; zxLastTime=now;
                cb(txt);
              }
            }
          }).then(ctrl=>{ _zxCtrl=ctrl; }).catch(()=>{});
          return;
        }catch(e){ console.warn('ZXing fallback'); }
      }

      // Fallback: jsQR (QR Code via canvas)
      if(window.jsQR){
        const canvas=document.createElement('canvas');
        const ctx=canvas.getContext('2d',{willReadFrequently:true});
        let lastCode='', lastCodeTime=0;
        const tick=()=>{
          if(!S.scanOn||!_scanStream){ return; }
          if(v.readyState===v.HAVE_ENOUGH_DATA && v.videoWidth>0){
            canvas.width=v.videoWidth; canvas.height=v.videoHeight;
            ctx.drawImage(v,0,0);
            try{
              const img=ctx.getImageData(0,0,canvas.width,canvas.height);
              const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
              if(code && code.data){
                const now=Date.now();
                // Debounce: ignore the SAME code within 1.5s, but allow a new/different
                // code immediately. This lets the user scan many QRs in a row without
                // re-opening the camera.
                if(code.data!==lastCode || (now-lastCodeTime)>1500){
                  lastCode=code.data; lastCodeTime=now;
                  cb(code.data);
                }
              }
            }catch(e){ /* getImageData can throw mid-resize — ignore this frame */ }
          }
          // ALWAYS schedule the next frame so scanning is continuous
          _scanRAF=requestAnimationFrame(tick);
        };
        _scanRAF=requestAnimationFrame(tick);
        notify('📷 กล้องพร้อม — ชี้ที่ QR Code','i');
      } else {
        notify('📷 กล้องพร้อม — ZXing กำลังโหลด ลองใหม่อีกครั้ง','w');
      }
    }catch(err){
      if(err.name==='NotAllowedError'){
        notify('❌ กรุณา Allow กล้อง — Safari Settings → Camera','e');
      } else {
        notify('❌ กล้อง: '+err.message,'e');
      }
      stopScan(); render();
    }
  },200);
}

      :`<span style="background:rgba(251,191,36,.15);color:var(--yellow);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700">ออก ${fc.nOut}/${fc.n_cab}</span>`

  </div>

  </div>
</div>
${woAct.length>0?woAct.slice(0,2).map(w=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--blue);font-weight:600">${w.id}</span><span style="flex:1;padding:0 8px;color:var(--text0)">${w.name}</span><span style="color:var(--text1)">${w.cabs.length}ชิ้น</span></div>`).join(''):'<div style="font-size:11px;color:var(--text2);text-align:center;padding:8px">ไม่มีใบงาน Active</div>'}`)}

function collapseSection(key, isOpen, title, prefix, body){
  return`
<div class="collapse-hdr ${isOpen?'open':''}" data-col="${prefix}:${key}">
  <div class="collapse-title">${title}</div>
  <span class="collapse-arrow ${isOpen?'open':''}">▶</span>
</div>
${isOpen?`<div class="collapse-body">${body}</div>`:''}`;
}

function statBlock(val, lbl, sub, color){
  return`<div class="stat-block" style="border-left:3px solid ${color}">
    <div class="stat-val" style="color:${color}">${typeof val==='number'?val.toLocaleString():val}</div>
    <div class="stat-lbl">${lbl}</div>
    ${sub?`<div class="stat-sub">${sub}</div>`:''}
  </div>`;
}

// ═══════════════ INVENTORY ═══════════════
function invPage(s){
  const SUBS=[{id:'all',l:'ทั้งหมด'},{id:'cabinet',l:'🖥️ Cabinet'},{id:'structure',l:'🏗️ Structure'},{id:'cable',l:'📡 Cable'},{id:'spare',l:'🔧 Spare'},{id:'accessories',l:'🗃️ Accessories'}];
  return`<div>
<div class="stabs">${SUBS.map(t=>`<button class="stab ${S.sub===t.id?'act':''}" data-sub="${t.id}">${t.l}</button>`).join('')}</div>
<div style="display:flex;gap:7px;margin-bottom:10px">
  <input class="inp" id="iq" oninput="S.q=this.value" value="${S.q.replace(/"/g,'&quot;')}" placeholder="🔍 ค้นหา SN / ชื่อ..." style="flex:1">
  <select class="inp" id="stfil" style="width:90px">
    ${[['all','ทุกสถานะ'],['in_stock','ในคลัง'],['out','ออกงาน'],['repair','ซ่อม']].map(([k,l])=>`<option value="${k}" ${S.stF===k?'selected':''}>${l}</option>`).join('')}
  </select>
</div>
${buildInvSub(S.sub, s)}
</div>`;
}

function buildInvSub(sub, s){
  const q=S.q.toLowerCase();
  if(sub==='all') return buildAllGroups(q, s);
  if(sub==='cabinet') return buildCabSection(q, s);
  if(sub==='structure') return buildStructSection(q);
  if(sub==='cable') return buildCableSection(q);
  if(sub==='spare') return buildSpareSection(q);
  if(sub==='accessories') return buildAccSection(q);
  return '';
}

function buildAllGroups(q, s){
  return [
    buildCollGrp('cab-g',true,'🖥️','Cabinet','var(--blue)',`${s.cab.in} ใน / ${s.cab.out} ออก`,buildCabSection(q,s,12)),
    buildCollGrp('str-g',true,'🏗️','Structure','var(--teal)',`HB ${s.hbL.total+s.hbS.total} ชิ้น`,buildStructSection(q,8)),
    buildCollGrp('cb-g',true,'📡','Cable','var(--blue)',`${Object.values(s.cables).reduce((a,v)=>a+v.in,0)} / ${Object.values(s.cables).reduce((a,v)=>a+v.total,0)}`,buildCableSection(q)),
    buildCollGrp('sp-g',false,'🔧','Spare','var(--orange)',`${ITEMS.filter(i=>['spare_module','recv_card','hub','psu','pdu_spare'].includes(i.group)).length} รายการ`,buildSpareSection(q,20)),
    buildCollGrp('ac-g',false,'🗃️','Accessories','var(--text1)',`${ACC.length} รายการ`,buildAccSection(q)),
  ].join('');
}

function buildCollGrp(key, defOpen, icon, name, color, info, body){
  const isOpen = S.invGroups[key] !== undefined ? S.invGroups[key] : defOpen;
  return`<div class="grp">
<div class="grp-h ${isOpen?'open':''}" data-invgrp="${key}">
  <div class="grp-left">
    <div class="grp-icon" style="background:${color}20;color:${color}">${icon}</div>
    <div><div class="grp-name">${name}</div><div class="grp-count">${info}</div></div>
  </div>
  <span class="grp-arrow ${isOpen?'open':''}">▶</span>
</div>
<div class="grp-body ${isOpen?'open':''}">${isOpen?body:''}</div>
</div>`;
}

function buildCabSection(q, s, limit=80){
  let fl=CAB.filter(c=>{
    if(q&&!(c.sn.toLowerCase().includes(q)||(c.pdu||'').toLowerCase().includes(q)||(c.fc||'').toLowerCase().includes(q)||(c.mods||[]).some(m=>m.toLowerCase().includes(q))))return false;
    if(S.stF!=='all'&&c.status!==S.stF)return false;
    if(S.szF!=='all'&&c.sz!==S.szF)return false;
    return true;
  });
  const sh=fl.slice(0,limit);
  return`<div>
${S.sub==='cabinet'?`<div class="pills">
${[['all','ทุกขนาด'],['500x1000mm','500×1000'],['500x500mm','500×500']].map(([k,l])=>`<button class="pill ${S.szF===k?'act':''}" data-szf="${k}">${l}</button>`).join('')}
</div>`:''}
<div style="font-size:10px;color:var(--text2);margin-bottom:7px">แสดง ${sh.length} / ${fl.length}</div>
${sh.map(c=>`<div class="ir ${c.status==='out'?'out':c.status==='repair'?'repair':c.cond==='damaged'?'damaged':''}" data-ocab="${c.sn}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
    <span class="ir-sn">${c.sn}</span>
    <div style="display:flex;gap:3px">${bdg(ST[c.status]?.c||'b-g',ST[c.status]?.l||'?')}${c.cond!=='good'?' '+bdg(CD[c.cond]?.c||'b-y',CD[c.cond]?.l||'?'):''}</div>
  </div>
  <div class="ir-meta"><span>📦 ${c.fc}</span><span>📐 ${c.sz}</span><span>🔌 ${(c.pdu||'-').slice(0,16)}</span><span>💡 ${(c.mods||[]).length}</span></div>
  ${c.note?`<div class="ir-note">⚠️ ${c.note.slice(0,60)}</div>`:''}
</div>`).join('')}
${fl.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:8px">+${fl.length-limit} รายการ — ค้นหาเพิ่ม</div>`:''}
</div>`;
}

function buildStructSection(q, limit=80){
  const hbL=ITEMS.filter(i=>i.subgroup==='Hanging Bar DBmk2-1000mm');
  const hbS=ITEMS.filter(i=>i.subgroup==='Hanging Bar RS-500mm');
  const fL=hbL.filter(i=>(!q||(i.sn||'').toLowerCase().includes(q))&&(S.stF==='all'||i.status===S.stF));
  const fS=hbS.filter(i=>(!q||(i.sn||'').toLowerCase().includes(q))&&(S.stF==='all'||i.status===S.stF));
  return`<div>
<div class="sec">Hanging Bar DBmk2-1000mm (${hbL.length} ชิ้น)</div>
${fL.slice(0,limit).map(it=>serialRow(it)).join('')}
${fL.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${fL.length-limit}</div>`:''}
<div class="sec">Hanging Bar RS-500mm (${hbS.length} ชิ้น)</div>
${fS.slice(0,limit).map(it=>serialRow(it)).join('')}
${fS.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${fS.length-limit}</div>`:''}
</div>`;
}

function buildCableSection(q){
  return`<div>
${Object.entries(CABLES).map(([k,v])=>{
  if(q&&!v.name.toLowerCase().includes(q)&&!v.spec.toLowerCase().includes(q))return'';
  const avail=v.total-v.out-v.repair;
  const pct=v.total>0?Math.round(avail/v.total*100):100;
  return`<div class="cable-card" data-cbl="${k}">
    <div class="cable-top">
      <div>
        <div class="cable-name">${v.icon} ${v.name}</div>
        <div class="cable-spec">${v.spec}</div>
      </div>
      <div class="cable-nums">
        <div>
          <div class="cable-main-num" style="color:${v.color}">${avail}</div>
          <div class="cable-total">/ ${v.total} เส้น</div>
        </div>
      </div>
    </div>
    <div class="pbar-lg"><div class="pfill-lg" style="width:${pct}%;background:${v.color}"></div></div>
    <div class="cable-stats">
      <div class="cable-stat"><div class="cs-dot" style="background:var(--green)"></div><span style="color:var(--green)">ในคลัง ${avail}</span></div>
      ${v.out>0?`<div class="cable-stat"><div class="cs-dot" style="background:var(--orange)"></div><span style="color:var(--orange)">ออก ${v.out}</span></div>`:''}
      ${v.repair>0?`<div class="cable-stat"><div class="cs-dot" style="background:var(--red)"></div><span style="color:var(--red)">ซ่อม ${v.repair}</span></div>`:''}
    </div>
  </div>`;}).join('')}
</div>`;
}


function buildFCSection(){
  // FC summary — show FC groups with cabinet statuses
  const open=S.dashOpen?.fc;

    FC_DB.filter(fc=>fc.cab_sns.some(s=>w.cabs.includes(s))).map(fc=>({fc,wo:w}))

${hdr('fc','✈️ Flight Case (136 FC · 840 Cabinet)')}
${open?`<div class="dash-body">
<div style="display:flex;gap:8px;margin-bottom:10px">
  ${[{l:'ทั้งหมด',v:136,c:'var(--blue)'},{l:'ออกทั้ง FC',v:fcOut.length,c:'var(--orange)'},{l:'ออกบางส่วน',v:fcPartial.length,c:'var(--yellow)'},{l:'ในคลัง',v:136-fcOut.length-fcPartial.length,c:'var(--green)'}].map(x=>`
  <div style="flex:1;background:var(--bg2);border-radius:9px;padding:9px;text-align:center;border:1px solid var(--border)">

  </div>`).join('')}
</div>
${activeWOFCs.length>0?`<div style="font-size:11px;font-weight:700;color:var(--text1);margin-bottom:6px">FC ที่ออกงาน</div>
<div style="background:var(--bg0);border:1px solid var(--border);border-radius:9px;padding:6px;max-height:160px;overflow-y:auto">
${[...new Map(activeWOFCs.map(x=>[x.fc.fc,x])).values()].map(({fc,wo})=>`

  <div>
    <span style="font-weight:700">FC ${fc.fc}</span>
    <span style="color:var(--text2);font-size:10px;margin-left:6px">${fc.n_cab} cabinet</span>
  </div>

  </div>

</div>`:'<div style="font-size:11px;color:var(--text2);text-align:center;padding:10px">✅ ทุก FC อยู่ในคลัง</div>'}
</div>`:''}
</div>`;

function buildSpareSection(q, limit=80){
  const groups=[
    {key:'spare_module',icon:'💡',name:'Spare Module',color:'var(--orange)'},
    {key:'recv_card',icon:'🎛️',name:'Receiving Card A8S-N',color:'var(--purple)'},
    {key:'hub',icon:'🔗',name:'HUB Card',color:'var(--pink)'},
    {key:'psu',icon:'⚡',name:'Power Supply',color:'var(--yellow)'},
    {key:'pdu_spare',icon:'🔌',name:'PDU Spare',color:'var(--teal)'},
  ];
  return`<div>${groups.map(g=>{
    let items=ITEMS.filter(i=>i.group===g.key);
    if(q)items=items.filter(i=>(i.sn||'').toLowerCase().includes(q)||(i.spec||'').toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q));
    // Status filter (allow 'installed' too)
    if(S.stF!=='all')items=items.filter(i=>i.status===S.stF);
    // For spare_module: show status counts
    const installed=g.key==='spare_module'?items.filter(i=>i.status==='installed').length:0;
    const inStk=g.key==='spare_module'?items.filter(i=>i.status==='in_stock').length:0;
    const hdr = g.key==='spare_module'
      ? `<div class="sec">${g.icon} ${g.name} — ${bdg('b-t',installed+' ติดตั้งแล้ว')} ${bdg('b-g',inStk+' ในคลัง')} <span style="color:var(--text2);font-size:10px">ทุกชิ้นมี SN</span></div>`
      : `<div class="sec">${g.icon} ${g.name} (${items.length} ชิ้น)</div>`;
    return hdr +
      items.slice(0,limit).map(it=>{
        // Enhanced row for spare module
        if(g.key==='spare_module'){
          const noteParts = (it.note||'').split('·');
          const cabLine = noteParts[0]||'';
          const issueLine = noteParts[2]||'';
          return`<div class="ir ${it.status==='installed'?'out':''}" data-oitem="${it.id}">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
<span class="ir-sn">${it.sn}</span>
<div style="display:flex;gap:3px">${bdg(ST[it.status]?.c||'b-t',ST[it.status]?.l||'?')}</div>
</div>
<div class="ir-meta">
${cabLine?`<span style="color:var(--text0)">🖥️ ${cabLine.trim()}</span>`:''}
${issueLine?`<span style="color:var(--yellow)">🔍 ${issueLine.trim()}</span>`:''}
</div>
</div>`;
        }
        return serialRow(it);
      }).join('') +
      (items.length>limit?`<div style="text-align:center;font-size:11px;color:var(--text2);padding:7px">+${items.length-limit}</div>`:'');
  }).join('')}</div>`;
}

function buildAccSection(q){
  const subs=['LED Processor','Module Spare','Bracket','Screw','Washer','LED Spare','Tool','ThermalPad','Storage','Flight Case'];
  return`<div>${subs.map(s=>{
    let items=s==='LED Processor'?ACC.filter(a=>a.group==='processor'):ACC.filter(a=>a.sub===s);
    if(q)items=items.filter(a=>(a.name||'').toLowerCase().includes(q)||(a.spec||'').toLowerCase().includes(q));
    if(!items.length)return'';
    return`<div class="sec">${s}</div>${items.map(a=>{
      const avail=(a.qty||0)-(a.out||0)-(a.repair||0);
      const pct=a.qty>0?Math.round(avail/a.qty*100):100;
      return`<div class="bulk-item" data-oblk="${a.id}">
        <div class="bulk-left">
          <div class="bulk-name">${a.name}</div>
          <div class="bulk-spec">${a.spec}</div>
          <div class="pbar" style="max-width:160px"><div class="pfill" style="width:${pct}%;background:var(--green)"></div></div>
        </div>
        <div class="bulk-right">
          <div class="bulk-num" style="color:${avail>0?'var(--green)':'var(--red)'}">${avail.toLocaleString()}</div>
          <div class="bulk-denom">/ ${a.qty.toLocaleString()}</div>
          ${a.out>0?`<div style="font-size:10px;color:var(--orange)">ออก ${a.out}</div>`:''}
        </div>
      </div>`;}).join('')}`;
  }).join('')}</div>`;
}

function serialRow(it){
  return`<div class="ir ${it.status==='out'?'out':it.status==='repair'?'repair':''}" data-oitem="${it.id}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
    <span class="ir-sn" style="font-size:11px">${it.sn||it.id}</span>
    <div style="display:flex;gap:3px">${bdg(ST[it.status]?.c||'b-g',ST[it.status]?.l||'?')}${it.cond&&it.cond!=='good'?' '+bdg(CD[it.cond]?.c||'b-y',CD[it.cond]?.l||'?'):''}</div>
  </div>
  <div class="ir-meta"><span style="font-family:monospace">${it.spec||''}</span>${it.note?`<span>📝 ${it.note.slice(0,35)}</span>`:''}</div>
</div>`;
}

    const nIn =cabs.filter(c=>c.status==='in_stock').length;
    const wo=nOut>0?WO.find(w=>w.status==='active'&&w.cabs.some(s=>fc.cab_sns.includes(s))):null;
