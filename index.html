function _addFCtoWO(fcNum){
  const fc=FC_DB.find(f=>f.fc_num===String(fcNum).padStart(3,'0'));
  if(!fc){notify('ไม่พบ FC','e');return;}
  if(!WO.filter(w=>w.status==='active').length){
    notify('เปิดใบงานก่อน','w'); return;
  }
  S.modal='wo';
  if(!S.woF||!S.woF.cabs) S.woF={name:'',loc:'',start:'',end:'',resp:'',notes:'',cabs:[],items:[],cables:{},procs:{},_cabTab:'fc',_openGrp:'',_scanOn:false};
  fc.cab_sns.forEach(s=>{if(!S.woF.cabs.includes(s))S.woF.cabs.push(s);});
  notify('✅ FC '+fc.fc+' → +'+fc.n_cab+' cabinet เข้าใบงาน','s');
  render();
}


function _removeFC(fcNum){
  const fc=FC_DB.find(f=>f.fc_num===String(fcNum).padStart(3,'0'));
  if(!fc){ notify('ไม่พบ FC','e'); return; }
  if(!S.woF||!S.woF.cabs) return;
  const before=S.woF.cabs.length;
  S.woF.cabs=S.woF.cabs.filter(s=>!fc.cab_sns.includes(s));
  const removed=before-S.woF.cabs.length;
  notify('🗑 ลบออก '+removed+' cabinet จาก FC '+fc.fc,'s');
  _woRender();
}

function _removeFCfromEdit(fcNum){
  const fc=FC_DB.find(f=>f.fc_num===String(fcNum).padStart(3,'0'));
  if(!fc){ notify('ไม่พบ FC','e'); return; }
  if(!S.woEdit||!S.woEdit.cabs) return;
  const before=S.woEdit.cabs.length;
  S.woEdit.cabs=S.woEdit.cabs.filter(s=>!fc.cab_sns.includes(s));
  const removed=before-S.woEdit.cabs.length;
  notify('🗑 ลบออก '+removed+' cabinet จาก FC '+fc.fc,'s');
  _woeRender();
}

function _addFC(fcNum){
  const fc=FC_DB.find(f=>f.fc_num===String(fcNum).padStart(3,'0'));
  if(!fc){notify('ไม่พบ FC: '+fcNum,'e');return;}
  let added=0;
  fc.cab_sns.forEach(s=>{
    if(CAB.find(c=>c.sn===s&&c.status==='in_stock')&&!S.woF.cabs.includes(s)){
      S.woF.cabs.push(s);added++;
    }
  });
  notify('✅ FC '+fc.fc+' → +'+added+' cabinet','s');
  _woRender();
}


function _woCabChk(cb){
  const sn=cb.dataset.sn;
  if(cb.checked){ if(!S.woF.cabs.includes(sn)) S.woF.cabs.push(sn); }
  else { S.woF.cabs=S.woF.cabs.filter(s=>s!==sn); }
  // Update summary label only
  const btn=document.getElementById('wo-ok');
  if(btn) btn.textContent='✅ ยืนยันเปิดใบงาน ('+S.woF.cabs.length+' cabinet)';
}
function _woItemChk(cb){
  const id=cb.dataset.itemId;
  if(!S.woF.items) S.woF.items=[];
  if(cb.checked){ if(!S.woF.items.includes(id)) S.woF.items.push(id); }
  else { S.woF.items=S.woF.items.filter(i=>i!==id); }
}
function _woRender(){
  // Lightweight re-render of just the modal content — preserve focus + cursor
  const bg=document.getElementById('wof-bg');
  if(!bg) return;
  // Save focus state
  const active=document.activeElement;
  const focusId=active?.id;
  const selStart=active?.selectionStart;
  const selEnd=active?.selectionEnd;
  const scrollY=bg.querySelector('.mo-body')?.scrollTop||0;
  // Rebuild
  const fresh=woFormModal();
  const tmp=document.createElement('div');
  tmp.innerHTML=fresh;
  const newMo=tmp.firstChild;
  bg.replaceWith(newMo);
  bindWOForm();
  // Restore focus + cursor + scroll
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){
      el.focus();
      if(selStart!=null&&el.setSelectionRange&&['text','search','tel','url','password','textarea'].includes(el.type||'textarea')){
        try{ el.setSelectionRange(selStart,selEnd); }catch(e){}
      }
    }
  }
  const body=newMo.querySelector('.mo-body');
  if(body&&scrollY) body.scrollTop=scrollY;
}
function bindWOForm(){
  // Cam button
  const cam=document.getElementById('btn-wo-scan-cam');
  if(cam) cam.onclick=()=>{
    S.woF._scanOn=!S.woF._scanOn;
    if(S.woF._scanOn){ _woRender(); setTimeout(()=>startScan('wo-cam',txt=>{
      const r=findScan(txt);
      if(!r){ notify('ไม่พบ: '+txt,'e'); return; }
      if(r.type==='fc'){
        r.data.cab_sns.forEach(s=>{if(!S.woF.cabs.includes(s))S.woF.cabs.push(s);});
        notify('✅ FC '+r.data.fc+' → +'+r.data.n_cab+' cabinet','s');
      } else if(r.type==='cab'){
        if(!S.woF.cabs.includes(r.data.sn))S.woF.cabs.push(r.data.sn);
        notify('✅ '+r.data.sn,'s');
      } else notify('ไม่พบ','e');
      _woRender();
    }),200); } else { stopScan(); _woRender(); }
  };
  const stopCam=document.getElementById('btn-wo-stop-cam');
  if(stopCam) stopCam.onclick=()=>{ S.woF._scanOn=false; stopScan(); _woRender(); };
  // Manual add
  const addBtn=document.getElementById('btn-wo-scan-add');
  if(addBtn) addBtn.onclick=()=>{
    const v=(document.getElementById('wo-scan-inp')?.value||'').trim();
    if(!v) return;
    const r=findScan(v);
    if(!r){ notify('ไม่พบ: '+v,'e'); return; }
    if(r.type==='fc'){
      r.data.cab_sns.forEach(s=>{if(!S.woF.cabs.includes(s))S.woF.cabs.push(s);});
      notify('✅ FC '+r.data.fc+' → +'+r.data.n_cab+' cabinet','s');
    } else if(r.type==='cab'){
      if(!S.woF.cabs.includes(r.data.sn))S.woF.cabs.push(r.data.sn); else notify('มีแล้ว','w');
      notify('✅ '+r.data.sn,'s');
    }
    _woRender();
  };
  // Clear cabs
  const clr=document.getElementById('btn-wo-clear-cabs');
  if(clr) clr.onclick=()=>{ S.woF.cabs=[]; _woRender(); };
  // FC search
  // Tab switch
  document.querySelectorAll('[data-wo-cab-tab]').forEach(b=>b.onclick=()=>{ S.woF._cabTab=b.dataset.woCabTab; _woRender(); });
  // FC row expand
  document.querySelectorAll('[data-wo-fc]').forEach(b=>b.onclick=(e)=>{
    if(e.target.closest('[data-wo-fc-add]')) return;
    const fc=FC_DB.find(f=>f.fc===b.dataset.woFc);
    if(fc) S.woF._selFC=S.woF._selFC?.fc===fc.fc?null:fc;
    _woRender();
  });
  // FC add all
  document.querySelectorAll('[data-wo-fc-add]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const fc=FC_DB.find(f=>f.fc===b.dataset.woFcAdd);
    if(!fc) return;
    fc.cab_sns.forEach(s=>{if(!S.woF.cabs.includes(s))S.woF.cabs.push(s);});
    notify('✅ FC '+fc.fc+' → +'+fc.n_cab+' cabinet','s');
    _woRender();
  });
  // Item group toggle
  document.querySelectorAll('[data-wo-grp]').forEach(b=>b.onclick=()=>{
    S.woF._openGrp=S.woF._openGrp===b.dataset.woGrp?'':b.dataset.woGrp; _woRender();
  });
  // Remove cabinet from selected
  document.querySelectorAll('[data-rc]').forEach(b=>b.onclick=()=>{
    const sn=b.dataset.rc;
    S.woF.cabs=S.woF.cabs.filter(s=>s!==sn);
    _woRender();
  });

  // WO submit
  const ok=document.getElementById('wo-ok');
  if(ok) ok.onclick=()=>{
    const name=(document.getElementById('wn')?.value||'').trim();
    if(!name){ notify('ใส่ชื่องานก่อน','w'); return; }
    if(!S.woF.cabs.length){ notify('เลือก Cabinet อย่างน้อย 1 ชิ้น','w'); return; }

    // ── Summary confirmation ────────────────────────────────────────────────
    const f=S.woF;
    const cab1000=CAB.filter(c=>f.cabs.includes(c.sn)&&c.sz==='500x1000mm').length;
    const cab500 =CAB.filter(c=>f.cabs.includes(c.sn)&&c.sz==='500x500mm').length;
    const cableLines=Object.entries(f.cables||{}).filter(([k,v])=>v>0)
      .map(([k,v])=>`  • ${CABLE_DB[k]?.name||k}: ${v} เส้น`).join('\n');
    const procLines=Object.entries(f.procs||{}).filter(([k,v])=>v>0)
      .map(([k,v])=>{
        const name=k==='vx2000pro'?'Novastar VX2000Pro':k==='cvtm'?'Novastar CVT-M':k;
        return `  • ${name}: ${v} เครื่อง`;
      }).join('\n');
    const itemLines=(f.items||[]).length>0?`  • Serial Items: ${f.items.length} ชิ้น`:'';

    // Item breakdown by group
    const itByGroup={};
    (f.items||[]).forEach(id=>{
      const it=ITEMS.find(i=>i.id===id);
      const g=it?.group||'other';
      itByGroup[g]=(itByGroup[g]||0)+1;
    });
    const groupL={structure:'Hanging Bar',recv:'Recv Card',hub:'HUB',psu:'PSU',pdu_spare:'PDU Spare',spare_module:'Spare Module'};
    const itemDetailL=Object.entries(itByGroup)
      .map(([g,n])=>`  • ${groupL[g]||g}: ${n} ชิ้น`).join('\n');
    const summary =
      `📋 ยืนยันเปิดใบงาน?\n`+
      `━━━━━━━━━━━━━━\n`+
      `${name}\n`+
      `📍 ${document.getElementById('wl')?.value||'-'}\n`+
      `👤 ${document.getElementById('wr')?.value||'-'}\n`+
      `━━━━━━━━━━━━━━\n`+
      `🖥️ Cabinet: ${f.cabs.length} (${cab1000}×1m + ${cab500}×½m)\n`+
      (cableLines?`📡 Cable:\n${cableLines}\n`:'')+
      (procLines?`💻 Processor:\n${procLines}\n`:'')+
      (itemDetailL?`🔧 อุปกรณ์ Serial:\n${itemDetailL}\n`:'');

    if(!confirm(summary)) return;

    const wo={
      id:'WO-'+Date.now(), name,
      loc: document.getElementById('wl')?.value||'',
      resp: document.getElementById('wr')?.value||'',
      start_date: document.getElementById('ws')?.value||'',
      end_date: document.getElementById('we')?.value||'',
      notes: document.getElementById('wno')?.value||'',
      cabs: [...S.woF.cabs],
      items: [...(S.woF.items||[])],
      cables: {...(S.woF.cables||{})},
      procs: {...(S.woF.procs||{})},
      accessories:{}, extras:[],
      status:'active', createdAt:new Date().toISOString(), completedAt:''
    };
    wo.items.forEach(id=>{ ITEMS=ITEMS.map(i=>i.id===id?{...i,status:'out',currentWO:wo.id}:i); });
    WO=[wo,...WO];
    CAB=CAB.map(c=>wo.cabs.includes(c.sn)?{...c,status:'out',currentWO:wo.id,upd:new Date().toISOString()}:c);
    // Update CABLES.out
    Object.entries(wo.cables||{}).forEach(([k,qty])=>{
      if(CABLES[k] && qty>0) CABLES[k]={...CABLES[k], out:(CABLES[k].out||0)+qty};
    });
    // Update ACC.out for processors
    const PROC_ACC_MAP={vx2000pro:'PROC-01',cvtm:'PROC-02'};
    Object.entries(wo.procs||{}).forEach(([id,qty])=>{
      const accId=PROC_ACC_MAP[id];
      if(accId&&qty>0) ACC=ACC.map(a=>a.id===accId?{...a,out:(a.out||0)+qty}:a);
    });
    sv(); S.modal=null; S.woF={name:'',loc:'',start:'',end:'',resp:'',notes:'',cabs:[],items:[],cables:{},procs:{},_cabTab:'fc',_openGrp:'',_scanOn:false};
    notify('✅ เปิดใบงาน '+wo.cabs.length+' ชิ้น','s'); render();
    // Push WO + CAB + FC + items immediately to prevent autoPull overwriting it
    if(S.gsUrl){
      clearTimeout(_gsSyncTimer);
      pushCloseWO(wo)
        .then(()=>{ notify('☁️ Sync แล้ว','s'); })
        .catch(e=>{ console.warn('WO push failed:',e); debounceGsSync(); });
    }
  };
  // close
  ['wof-bg','wof-x'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('click',e=>{
      if(id==='wof-bg'&&e.target!==el) return;
      stopScan(); S.woF._scanOn=false; S.modal=null; render();
    });
  });
}

function coModal(){

    const conf = wo._confirmed?.[sn];
    return !conf && CAB.find(c=>c.sn===sn)?.status==='in_stock';

  const stillOutC = woCabs.filter(sn=>{

  const problemC = woCabs.filter(sn=>wo._confirmed?.[sn]);

// ── coBodyHTML: the part of the close-WO modal that changes as items are scanned.

// destroying/recreating the camera stream (which caused the black-screen freeze).
function coBodyHTML(wo){
  const woCabs=wo.cabs||[];
  const inStockC = woCabs.filter(sn=>{
    const conf = wo._confirmed?.[sn];
    return !conf && CAB.find(c=>c.sn===sn)?.status==='in_stock';
  });
  const stillOutC = woCabs.filter(sn=>{
    const conf = wo._confirmed?.[sn];
    return !conf && CAB.find(c=>c.sn===sn)?.status==='out';

  const problemC = woCabs.filter(sn=>wo._confirmed?.[sn]);

  const itemsProblem  = woItems.filter(id=>['lost','repair','damaged'].includes(wo._itemConfirmed?.[id]));

  return `<!-- Stats -->

  {l:'คืนแล้ว',v:inStockC.length,c:'var(--green)'},
  {l:'ยังออก',v:stillOutC.length,c:'var(--orange)'},
  {l:'มีปัญหา',v:problemC.length+itemsProblem.length,c:'var(--red)'},
].map(x=>`<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:${x.c}">${x.v}</div><div style="font-size:9px;color:var(--text2)">${x.l}</div></div>`).join('')}
</div>

<!-- Cabinet list -->

<div style="max-height:180px;overflow-y:auto;background:var(--bg0);border:1px solid var(--border);border-radius:8px;padding:4px">
${woCabs.map(sn=>{
  const c=CAB.find(cc=>cc.sn===sn);
  const isOut=c?.status==='out';

// ── refreshCoContent: re-render only the #co-content block + rebind its buttons.
// Does NOT touch the <video> element, so the camera keeps running after a scan.
// Preserves scroll position aggressively so the user doesn't snap to the top.
function refreshCoContent(){
  const wo=S.woCheck;
  if(!wo) return;
  const el=document.getElementById('co-content');
  if(!el) return;
  // The scroll container is the modal body (.mo-body inside #co-bg).
  const scroller = document.getElementById('co-bg')?.querySelector('.mo-body');
  const savedTop = scroller ? scroller.scrollTop : 0;
  // Lock #co-content height before innerHTML swap so the scroll container doesn't
  // briefly collapse (which is what makes iOS Safari reset scrollTop to 0).
  const lockedHeight = el.getBoundingClientRect().height;
  if(lockedHeight) el.style.minHeight = lockedHeight + 'px';

  el.innerHTML = coBodyHTML(wo);
  bindCoContentButtons();

  // Restore scroll across several ticks (iOS Safari needs repeated attempts).
  const restore = ()=>{ if(scroller) scroller.scrollTop = savedTop; };
  restore();
  requestAnimationFrame(()=>{
    restore();
    requestAnimationFrame(()=>{ restore(); el.style.minHeight=''; });
  });
  setTimeout(restore, 30);
  setTimeout(restore, 80);
  setTimeout(()=>{ restore(); el.style.minHeight=''; }, 150);
}

// Bind buttons inside #co-content. All tap actions use refreshCoContent (which
// preserves scroll + keeps camera alive). Problem flags open a separate modal,
// close actions exit the modal entirely.
// Bind buttons inside #co-content via EVENT DELEGATION on the container.
// Delegation survives innerHTML rebuilds (the container persists), which fixes
// iOS Safari occasionally not registering taps on freshly-created buttons.
function bindCoContentButtons(){
  const container = document.getElementById('co-content');
  if(!container) return;
  // Guard: only attach the delegated listener once per container element.
  if(container._coDelegated) return;
  container._coDelegated = true;

  container.addEventListener('click', (e)=>{
    const wo = S.woCheck;
    if(!wo) return;
    const btn = e.target.closest('button');
    if(!btn) return;
    const d = btn.dataset;

    // 📥 คืน cabinet
    if(d.coRet){
      e.stopPropagation(); e.preventDefault();
      const sn=d.coRet;
      updCab(sn,{status:'in_stock',cond:'good',currentWO:null});
      if(!S._dirtyCabSns)S._dirtyCabSns=new Set();
      S._dirtyCabSns.add(sn);
      notify('📥 '+sn,'s');
      refreshCoContent();
      return;
    }
    // 📥 คืน serial item
    if(d.coIret){
      e.stopPropagation(); e.preventDefault();
      const id=d.coIret;
      if(!wo._itemConfirmed)wo._itemConfirmed={};
      wo._itemConfirmed[id]='returned';
      if(ITEMS.find(i=>i.id===id)) updItem(id,{status:'in_stock',cond:'good',currentWO:null});
      if(!S._dirtyItemIds)S._dirtyItemIds=new Set();
      S._dirtyItemIds.add(id);
      notify('📥 คืน item','s');
      refreshCoContent();
      return;
    }
    // ⚠️ flag cabinet problem → open missing modal
    if(d.coMiss){
      e.stopPropagation();
      if(S.scanOn) stopScan();
      const sc = document.getElementById('co-bg')?.querySelector('.mo-body');
      S._coScrollY = sc ? sc.scrollTop : 0;
      S.missingItem=d.coMiss; S.missingItemType='cab'; S.modal='missing'; render();
      return;
    }
    // ⚠️ flag item problem → open missing modal
    if(d.coImiss){
      e.stopPropagation();
      if(S.scanOn) stopScan();
      const sc = document.getElementById('co-bg')?.querySelector('.mo-body');
      S._coScrollY = sc ? sc.scrollTop : 0;
      S.missingItem=d.coImiss; S.missingItemType='item'; S.modal='missing'; render();
      return;
    }
    // ↺ undo cabinet → back to 'out' (pending)
    if(d.coUndo){
      e.stopPropagation(); e.preventDefault();
      const sn=d.coUndo;
      if(wo._confirmed) delete wo._confirmed[sn];
      updCab(sn,{status:'out',cond:'good',currentWO:wo.id});
      if(!S._dirtyCabSns)S._dirtyCabSns=new Set();
      S._dirtyCabSns.add(sn);
      WO=WO.map(w=>w.id===wo.id?{...wo}:w);
      sv();
      notify('↺ แก้ไข '+sn+' — กลับเป็นยังไม่คืน','i');
      refreshCoContent();
      return;
    }
    // ↺ undo serial item → back to 'out' (pending)
    if(d.coIundo){
      e.stopPropagation(); e.preventDefault();
      const id=d.coIundo;
      if(wo._itemConfirmed) delete wo._itemConfirmed[id];
      updItem(id,{status:'out',cond:'good',currentWO:wo.id});
      if(!S._dirtyItemIds)S._dirtyItemIds=new Set();
      S._dirtyItemIds.add(id);
      WO=WO.map(w=>w.id===wo.id?{...wo}:w);
      sv();
      notify('↺ แก้ไข item — กลับเป็นยังไม่คืน','i');
      refreshCoContent();
      return;
    }
    // ✅ close WO (complete)
    if(d.closewo){
      e.stopPropagation();
      if(S.scanOn) stopScan();
      if(window.doCloseWO) window.doCloseWO(d.closewo);
      return;
    }
    // ⚠️ force close (incomplete)
    if(d.forceClose){
      e.stopPropagation();
      if(S.scanOn) stopScan();
      if(window.doForceCloseWO) window.doForceCloseWO(d.forceClose);
      return;
    }
  });
}

// ── WO Edit helpers (no-re-render for checkbox) ───────────────────────────────
function _woeRender(){
  const bg=document.getElementById('woe-bg');
  if(!bg) return;
  // Save focus + cursor + scroll
  const active=document.activeElement;
  const focusId=active?.id;
  const selStart=active?.selectionStart;
  const selEnd=active?.selectionEnd;
  const scrollY=bg.querySelector('.mo-body')?.scrollTop||0;
  // Preserve the live camera <video> node (with its MediaStream) so the camera
  // doesn't freeze/black-out when we rebuild the modal after a scan.
  const liveCam = (S.scanOn && _scanStream) ? document.getElementById('woe-cam') : null;
  // Rebuild
  const tmp=document.createElement('div');
  tmp.innerHTML=woEditModal();
  const newMo=tmp.firstChild;
  bg.replaceWith(newMo);
  // Swap the freshly-rendered (dead) video with the live one we preserved
  if(liveCam){
    const newCam=newMo.querySelector('#woe-cam');
    if(newCam && newCam!==liveCam){
      newCam.replaceWith(liveCam);
    }
  }
  _bindWoeForm();
  // Restore
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){
      el.focus();
      if(selStart!=null&&el.setSelectionRange&&['text','search','tel','url','password','textarea'].includes(el.type||'textarea')){
        try{ el.setSelectionRange(selStart,selEnd); }catch(e){}
      }
    }
  }
  const body=newMo.querySelector('.mo-body');
  if(body&&scrollY) body.scrollTop=scrollY;
}
function _woeCabChk(cb){
  const sn=cb.dataset.sn;
  if(!S.woEdit.cabs) S.woEdit.cabs=[];
  if(cb.checked){
    if(!S.woEdit.cabs.includes(sn)) S.woEdit.cabs.push(sn);
  } else {
    S.woEdit.cabs=S.woEdit.cabs.filter(s=>s!==sn);
  }
  // Update summary count
  const sum=document.querySelector('[data-woe-sum]');
  if(sum) sum.textContent=S.woEdit.cabs.length+' ชิ้น';
}
function _woeItemChk(cb){
  const id=cb.dataset.itemId;
  if(!S.woEdit.items) S.woEdit.items=[];
  if(cb.checked){ if(!S.woEdit.items.includes(id)) S.woEdit.items.push(id); }
  else { S.woEdit.items=S.woEdit.items.filter(i=>i!==id); }
}
function _addFCtoEdit(fcNum){
  const fc=FC_DB.find(f=>f.fc_num===String(fcNum).padStart(3,'0'));
  if(!fc){ notify('ไม่พบ FC','e'); return; }
  if(!S.woEdit.cabs) S.woEdit.cabs=[];
  let added=0;
  fc.cab_sns.forEach(sn=>{
    const cab=CAB.find(c=>c.sn===sn);
    if(cab&&!S.woEdit.cabs.includes(sn)){ S.woEdit.cabs.push(sn); added++; }
  });
  notify('✅ FC '+fc.fc+' → +'+added+' cabinet','s');
  _woeRender();
}
function _bindWoeForm(){
  // Camera scan
  const camBtn=document.getElementById('btn-woe-scan-cam');
  if(camBtn) camBtn.onclick=()=>{
    S.woEdit._scanOn=!S.woEdit._scanOn;
    if(S.woEdit._scanOn){
      _woeRender();
      setTimeout(()=>startScan('woe-cam',txt=>{
        const r=findScan(txt);
        if(!r){ notify('ไม่พบ: '+txt,'e'); return; }
        if(r.type==='fc'){
          if(!S.woEdit.cabs) S.woEdit.cabs=[];
          r.data.cab_sns.forEach(sn=>{ if(!S.woEdit.cabs.includes(sn)) S.woEdit.cabs.push(sn); });
          notify('✅ FC '+r.data.fc+' → +'+r.data.n_cab+' cabinet','s');
        } else if(r.type==='cab'){
          if(!S.woEdit.cabs) S.woEdit.cabs=[];
          if(!S.woEdit.cabs.includes(r.data.sn)) S.woEdit.cabs.push(r.data.sn);
          notify('✅ '+r.data.sn,'s');
        } else notify('ไม่พบ','e');
        _woeRender();
      }),200);
    } else { stopScan(); _woeRender(); }
  };
  const stopCamBtn=document.getElementById('btn-woe-stop-cam');
  if(stopCamBtn) stopCamBtn.onclick=()=>{ S.woEdit._scanOn=false; stopScan(); _woeRender(); };
  // Manual add
  const addBtn=document.getElementById('btn-woe-scan-add');
  if(addBtn) addBtn.onclick=()=>{
    const v=(document.getElementById('woe-scan-inp')?.value||'').trim();
    if(!v) return;
    const r=findScan(v);
    if(!r){ notify('ไม่พบ: '+v,'e'); return; }
    if(r.type==='fc'){
      if(!S.woEdit.cabs) S.woEdit.cabs=[];
      r.data.cab_sns.forEach(sn=>{ if(!S.woEdit.cabs.includes(sn)) S.woEdit.cabs.push(sn); });
      notify('✅ FC '+r.data.fc+' → +'+r.data.n_cab+' cabinet','s');
    } else if(r.type==='cab'){
      if(!S.woEdit.cabs) S.woEdit.cabs=[];
      if(!S.woEdit.cabs.includes(r.data.sn)) S.woEdit.cabs.push(r.data.sn);
      else notify('มีแล้ว','w');
      notify('✅ '+r.data.sn,'s');
    }
    _woeRender();
  };
  // Tabs
  document.querySelectorAll('[data-woe-cab-tab]').forEach(b=>b.onclick=()=>{ S.woEdit._cabTab=b.dataset.woeCabTab; _woeRender(); });
  // Group toggle
  document.querySelectorAll('[data-woe-grp]').forEach(b=>b.onclick=()=>{
    S.woEdit._openGrp=S.woEdit._openGrp===b.dataset.woeGrp?'':b.dataset.woeGrp; _woeRender();
  });
  // Remove cabinet
  document.querySelectorAll('[data-woe-rem]').forEach(b=>b.onclick=()=>{
    const sn=b.dataset.woeRem;
    S.woEdit.cabs=S.woEdit.cabs.filter(s=>s!==sn);
    _woeRender();
  });
  // Remove extra
  document.querySelectorAll('[data-woe-rem-ex]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.woeRemEx;
    S.woEdit.extras=(S.woEdit.extras||[]).filter((_,idx)=>idx!==i);
    _woeRender();
  });
  // Add extra
  const addEx=document.getElementById('btn-woe-add-ex');
  if(addEx) addEx.onclick=()=>{
    const label=(document.getElementById('woe-ex-label')?.value||'').trim();
    const qty=parseInt(document.getElementById('woe-ex-qty')?.value)||1;
    const unit=(document.getElementById('woe-ex-unit')?.value||'ชิ้น').trim();
    if(!label) return;
    S.woEdit.extras=[...(S.woEdit.extras||[]),{label,qty,unit}];
    _woeRender();
  };
  // Close
  ['woe-bg','woe-x','woe-x2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('click',e=>{
      if(id==='woe-bg'&&e.target!==el) return;
      stopScan(); if(S.woEdit) S.woEdit._scanOn=false; S.modal=null; S.woEdit=null; render();
    });
  });
  // Save
  const saveBtn=document.getElementById('btn-woe-save');
  if(saveBtn) saveBtn.onclick=()=>{
    if(!S.woEdit) return;
    const woId=S.woEdit.id;
    const name=(document.getElementById('woe-name')?.value||'').trim();
    if(!name){ notify('ใส่ชื่องาน','w'); return; }

    // ── Summary confirmation ────────────────────────────────────────────────
    const _cables_={};
    document.querySelectorAll('[data-woe-cable]').forEach(inp=>{
      const v=parseInt(inp.value)||0; if(v>=0) _cables_[inp.dataset.woeCable]=v;
    });
    const _procs_={};
    document.querySelectorAll('[data-woe-proc]').forEach(inp=>{
      const v=parseInt(inp.value)||0; if(v>=0) _procs_[inp.dataset.woeProc]=v;
    });
    const _cabs_=S.woEdit.cabs||[];
    const _items_=S.woEdit.items||[];
    const _cab1000=CAB.filter(c=>_cabs_.includes(c.sn)&&c.sz==='500x1000mm').length;
    const _cab500 =CAB.filter(c=>_cabs_.includes(c.sn)&&c.sz==='500x500mm').length;
    const _cableL_=Object.entries(_cables_).filter(([k,v])=>v>0)
      .map(([k,v])=>`  • ${CABLE_DB[k]?.name||k}: ${v} เส้น`).join('\n');
    const _procL_=Object.entries(_procs_).filter(([k,v])=>v>0)
      .map(([k,v])=>{
        const nm=k==='vx2000pro'?'Novastar VX2000Pro':k==='cvtm'?'Novastar CVT-M':k;
        return `  • ${nm}: ${v} เครื่อง`;
      }).join('\n');
    // Count items by group for clarity
    const _itemsByGroup_={};
    _items_.forEach(id=>{
      const it=ITEMS.find(i=>i.id===id);
      const g=it?.group||'other';
      _itemsByGroup_[g]=(_itemsByGroup_[g]||0)+1;
    });
    const _groupLabels_={structure:'Hanging Bar',recv:'Recv Card',hub:'HUB',psu:'PSU',pdu_spare:'PDU Spare',spare_module:'Spare Module'};
    const _itemL_=Object.entries(_itemsByGroup_)
      .map(([g,n])=>`  • ${_groupLabels_[g]||g}: ${n} ชิ้น`).join('\n');
    
    const _summary_ =
      `📋 บันทึกการแก้ไขใบงาน?\n`+
      `━━━━━━━━━━━━━━\n`+
      `${name}\n`+
      `📍 ${document.getElementById('woe-loc')?.value||'-'}\n`+
      `👤 ${document.getElementById('woe-resp')?.value||'-'}\n`+
      `━━━━━━━━━━━━━━\n`+
      `🖥️ Cabinet: ${_cabs_.length} (${_cab1000}×1m + ${_cab500}×½m)\n`+
      (_cableL_?`📡 Cable:\n${_cableL_}\n`:'')+
      (_procL_?`💻 Processor:\n${_procL_}\n`:'')+
      (_itemL_?`🔧 อุปกรณ์ Serial:\n${_itemL_}\n`:'');
    if(!confirm(_summary_)) return;

    // ── Read form values ────────────────────────────────────────────────────
    const cables={};
    document.querySelectorAll('[data-woe-cable]').forEach(inp=>{
      const v=parseInt(inp.value)||0;
      if(v>=0) cables[inp.dataset.woeCable]=v;  // keep 0 values too
    });
    const procs={};
    document.querySelectorAll('[data-woe-proc]').forEach(inp=>{
      const v=parseInt(inp.value)||0;
      if(v>=0) procs[inp.dataset.woeProc]=v;
    });

    // ── Source of truth: original WO from array ─────────────────────────────
    const origWO=WO.find(w=>w.id===woId)||{};
    const origCabs=[...(origWO.cabs||[])];   // snapshot before any mutation
    const newCabs=[...(S.woEdit.cabs||[])];  // current selection
    const origProcs=origWO.procs||{};
    const origCables=origWO.cables||{};

    // ── Update CAB statuses ─────────────────────────────────────────────────
    // Removed from WO → return to stock
    if(!S._dirtyCabSns) S._dirtyCabSns = new Set();
    origCabs.filter(sn=>!newCabs.includes(sn)).forEach(sn=>{
      CAB=CAB.map(c=>c.sn===sn?{...c,status:'in_stock',currentWO:null,upd:new Date().toISOString()}:c);
      S._dirtyCabSns.add(sn);  // mark for next sync
    });
    // Added to WO → mark out
    newCabs.filter(sn=>!origCabs.includes(sn)).forEach(sn=>{
      CAB=CAB.map(c=>c.sn===sn?{...c,status:'out',currentWO:woId,upd:new Date().toISOString()}:c);
      S._dirtyCabSns.add(sn);
    });

    // ── Update ACC.out for processor changes ────────────────────────────────
    const PROC_MAP={vx2000pro:'PROC-01',cvtm:'PROC-02'};
    Object.entries(PROC_MAP).forEach(([pid,accId])=>{
      const oldQ=origProcs[pid]||0;
      const newQ=procs[pid]||0;
      const diff=newQ-oldQ;
      if(diff!==0) ACC=ACC.map(a=>a.id===accId?{...a,out:Math.max(0,(a.out||0)+diff)}:a);
    });

    // ── Update CABLES.out for cable changes ─────────────────────────────────
    Object.keys(CABLE_DB).forEach(k=>{
      const oldQ=origCables[k]||0;
      const newQ=cables[k]||0;
      const diff=newQ-oldQ;
      if(diff!==0&&CABLES[k]) CABLES[k]={...CABLES[k],out:Math.max(0,(CABLES[k].out||0)+diff)};
    });

    // ── Update ITEMS status for serial items added/removed ────────────────────
    const origItems=[...(origWO.items||[])];
    const newItems=[...(S.woEdit.items||[])];
    // Removed items → return to stock
    if(!S._dirtyItemIds) S._dirtyItemIds = new Set();
    origItems.filter(id=>!newItems.includes(id)).forEach(id=>{
      ITEMS=ITEMS.map(i=>i.id===id?{...i,status:'in_stock',currentWO:null}:i);
      S._dirtyItemIds.add(id);
    });
    // Added items → mark out
    newItems.filter(id=>!origItems.includes(id)).forEach(id=>{
      ITEMS=ITEMS.map(i=>i.id===id?{...i,status:'out',currentWO:woId}:i);
      S._dirtyItemIds.add(id);
    });

    // ── Save WO ─────────────────────────────────────────────────────────────
    const updated={
      ...origWO,
      name,
      loc:   document.getElementById('woe-loc')?.value||'',
      resp:  document.getElementById('woe-resp')?.value||'',
      start_date: document.getElementById('woe-start')?.value||'',
      end_date:   document.getElementById('woe-end')?.value||'',
      notes: document.getElementById('woe-notes')?.value||'',
      cabs:  newCabs,
      cables,
      procs,
      items: newItems,
      extras: [...(S.woEdit.extras||[])],
      updatedAt: new Date().toISOString(),
    };
    WO=WO.map(w=>w.id===woId?updated:w);
    sv();
    stopScan();
    S.modal=null; S.woEdit=null;
    notify('✅ บันทึกใบงานแล้ว','s');
    render();
    // Push edited WO + all affected CABs/FCs (including removed cabs)
    if(S.gsUrl){
      clearTimeout(_gsSyncTimer);
      // removed cabs also changed status → their FCs need recompute too
      const removedSns = origCabs.filter(sn=>!newCabs.includes(sn));
      pushCloseWO(updated, removedSns)
        .then(()=>{ notify('☁️ Sync แล้ว','s'); })
        .catch(e=>{ console.warn('WO edit push failed:',e); debounceGsSync(); });
    }
  };
}

// ── LOCAL AI FALLBACK (works offline) ──────────────────────────────────
function localAI(msg, ctx){
  const m = msg.toLowerCase();

  // ── Detect screen size query ─────────────────────────────────────────
  const szMatch = msg.match(/(\d+(?:\.\d+)?)\s*[mx×xX]\s*(\d+(?:\.\d+)?)/i);

  if(szMatch && (m.includes('จอ')||m.includes('ขนาด')||m.includes('ต้องใช้')||m.includes('คำนวณ')||m.includes('screen'))){
    const W = parseFloat(szMatch[1]);
    const H = parseFloat(szMatch[2]);

    if(W>0 && H>0 && W<=100 && H<=30){
      const s = stats();
      const procAvail = (ACC.find(a=>a.id==='PROC-01')?.qty||12)-(ACC.find(a=>a.id==='PROC-01')?.out||0);

      // ── Cabinet layout: mixed 1000mm + 500mm ──────────────────────
      // กว้าง: ทุก cabinet กว้าง 500mm → cols = W ÷ 0.5
      const cols = Math.round(W / 0.5);
      // สูง: Cabinet 1000mm ก่อน (floor) + Cabinet 500mm ส่วนที่เหลือ
      const rows1000 = Math.floor(H / 1.0);
      const remH     = Math.round((H - rows1000 * 1.0) * 10) / 10;
      const rows500  = remH >= 0.45 ? Math.round(remH / 0.5) : 0;
      const actualH  = rows1000 * 1.0 + rows500 * 0.5;

      const n1000 = cols * rows1000;
      const n500  = cols * rows500;
      const nAll  = n1000 + n500;

      const resW = cols * 200;
      const resH = rows1000 * 400 + rows500 * 200;
      const kg   = n1000 * 9 + n500 * 4.5;

      // Hanging Bar = แนวนอนตามความกว้าง, DBmk2-1000mm ยาว 1m/ชิ้น
      const hb = Math.round(W / 1.0);

      // Cables & Processor
      const il      = nAll;
      const ports   = Math.ceil(nAll / 8);
      const msTotal = ports * 2;
      const mp      = Math.ceil(nAll / 10);
      const proc    = Math.ceil(ports * 2 / 20);

      const ok_cab1 = s.c1000.in >= n1000;
      const ok_cab5 = s.c500.in  >= n500;
      const ok_hb   = s.hbL.in   >= hb;
      const ok_il   = s.cables.il_signal?.in  >= il;
      const ok_ms   = s.cables.main_signal?.in >= msTotal;
      const ok_mp   = s.cables.main_power?.in  >= mp;
      const ok_proc = procAvail >= proc;

      let out = `📐 **จอ ${W}m × ${H}m** → สูงจริง ${actualH}m\n\n`;

      if(n1000 > 0) out += `📦 Cabinet 500×1000mm: **${n1000} ชิ้น** (${cols}คอล × ${rows1000}แถว) ${ok_cab1?'✅':'❌ มี '+s.c1000.in}\n`;
      if(n500  > 0) out += `📦 Cabinet 500×500mm:  **${n500} ชิ้น** (${cols}คอล × ${rows500}แถว) ${ok_cab5?'✅':'❌ มี '+s.c500.in}\n`;

      out += `🏗️ Hanging Bar DBmk2-1000mm: **${hb} ชิ้น** (${W}m ÷ 1m แนวนอน) ${ok_hb?'✅':'❌ มี '+s.hbL.in}\n`;
      out += `🖥️ Resolution: **${resW}×${resH} px**\n`;
      out += `⚖️ น้ำหนักรวม: **${kg} kg** (${(kg/1000).toFixed(2)} ตัน)\n\n`;

      out += `🔗 Interlink Signal 1.3m: **${il} เส้น** ${ok_il?'✅':'❌'}\n`;
      out += `⚡ Interlink Power 1.3m: **${il} เส้น** ${s.cables.il_power?.in>=il?'✅':'❌'}\n`;
      out += `📶 Main Signal 10m: **${msTotal} เส้น** (${ports}+${ports}) ${ok_ms?'✅':'❌'}\n`;
      out += `⚡ Main Power 10m: **${mp} เส้น** ${ok_mp?'✅':'❌'}\n`;
      out += `💻 Novastar VX2000Pro: **${proc} เครื่อง**\n`;
      out += `   └ ${ports} main + ${ports} backup = ${ports*2} ports ÷ 20 ${ok_proc?'✅':'❌ มี '+procAvail}\n\n`;

      out += `📊 สรุปของในคลัง:\n`;
      if(n1000>0) out += `• Cabinet 1000mm: ${s.c1000.in}/${s.c1000.total} ${ok_cab1?'✅':'❌ ขาด '+(n1000-s.c1000.in)}\n`;
      if(n500>0)  out += `• Cabinet 500mm:  ${s.c500.in}/${s.c500.total} ${ok_cab5?'✅':'❌ ขาด '+(n500-s.c500.in)}\n`;
      out += `• Hanging Bar: ${s.hbL.in}/${s.hbL.total} ${ok_hb?'✅':'❌ ขาด '+(hb-s.hbL.in)}\n`;
      out += `• Main Signal: ${s.cables.main_signal?.in}/${s.cables.main_signal?.total} ${ok_ms?'✅':'❌ ขาด '+(msTotal-(s.cables.main_signal?.in||0))}\n`;
      out += `• VX2000Pro:   ${procAvail}/${ACC.find(a=>a.id==='PROC-01')?.qty||12} ${ok_proc?'✅':'❌ ขาด '+(proc-procAvail)}`;

      return out;
    }
  }

  // ── Status summary ────────────────────────────────────────────────────
  if(m.includes('สรุป')||m.includes('status')||m.includes('สถานะ')){
    const s = stats();
    const procAvail=(ACC.find(a=>a.id==='PROC-01')?.qty||12)-(ACC.find(a=>a.id==='PROC-01')?.out||0);
    const cvtAvail=(ACC.find(a=>a.id==='PROC-02')?.qty||8)-(ACC.find(a=>a.id==='PROC-02')?.out||0);
    return `📊 **สรุปสถานะคลัง MAH LED Wall**\n\n` +
      `🖥️ Cabinet:\n• 500×1000mm: ${s.c1000.in}/${s.c1000.total}${s.c1000.out>0?' | ออก '+s.c1000.out:''}\n` +
      `• 500×500mm: ${s.c500.in}/${s.c500.total}${s.c500.out>0?' | ออก '+s.c500.out:''}\n\n` +
      `🏗️ Hanging Bar:\n• DBmk2-1000mm: ${s.hbL.in}/${s.hbL.total}\n• RS-500mm: ${s.hbS.in}/${s.hbS.total}\n\n` +
      `📡 Cable:\n• Interlink Signal: ${s.cables.il_signal?.in}/${s.cables.il_signal?.total}\n` +
      `• Interlink Power: ${s.cables.il_power?.in}/${s.cables.il_power?.total}\n` +
      `• Main Signal 10m: ${s.cables.main_signal?.in}/${s.cables.main_signal?.total}\n` +
      `• Main Power 10m: ${s.cables.main_power?.in}/${s.cables.main_power?.total}\n\n` +
      `💻 Processor:\n• VX2000Pro: ${procAvail}/${ACC.find(a=>a.id==='PROC-01')?.qty||12}\n` +
      `• CVT-M: ${cvtAvail}/${ACC.find(a=>a.id==='PROC-02')?.qty||8}\n\n` +
      `🔧 Spare Module: ${ITEMS.filter(i=>i.group==='spare_module'&&i.status==='in_stock').length}/160\n` +
      `📋 ใบงาน Active: ${s.activeWO}`;
  }

  // ── PDU query ─────────────────────────────────────────────────────────
  if(m.includes('pdu')){
    const pduL=ITEMS.filter(i=>i.subgroup==='PDU Spare 500x1000'&&i.status==='in_stock').length;
    const pduS=ITEMS.filter(i=>i.subgroup==='PDU Spare 500x500'&&i.status==='in_stock').length;
    return `🔌 **PDU Spare คงเหลือ:**\n• IRRS-500x1000: **${pduL}** ชิ้น\n• IRRS-500x500: **${pduS}** ชิ้น`;
  }

  return null; // let API handle it
}

async function shareWOReport(wo){
  // Mobile-first: open print-friendly HTML in new tab
  // Then user can: iOS Share → Print → Save to Files (PDF) | Desktop: Cmd+P → Save as PDF

  const fname = `WO_${wo.id}_${(wo.name||'').replace(/[^a-zA-Z0-9ก-๙_-]/g,'_')}`;
  
  // Open new window FIRST (synchronously within click) — required for iOS popup
  const w = window.open('', '_blank');
  if(!w){
    notify('⚠️ Pop-up ถูกบล็อก — กดอนุญาตที่ address bar','e');
    return;
  }
  
  // Write print-friendly HTML with native browser print support
  const printHTML = `<!DOCTYPE html><html><head><meta charset="utf-8">
<title>${fname}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@page { size: A4; margin: 12mm; }
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11pt; color: #222; margin:0; padding:0; background:#f5f5f5; }
.toolbar { position:sticky; top:0; background:#4f9cf9; color:#fff; padding:12px 16px; display:flex; gap:8px; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.15); z-index:100; }
.toolbar .title { font-size:13px; font-weight:600; }
.toolbar .btns { display:flex; gap:6px; }
.toolbar button { background:#fff; color:#4f9cf9; border:none; padding:8px 14px; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; }
.toolbar button:active { transform:scale(0.96); }
.toolbar button.close { background:rgba(255,255,255,.2); color:#fff; }
.page { background:#fff; max-width:210mm; margin:16px auto; box-shadow:0 4px 16px rgba(0,0,0,.1); }
@media print {
  body { background:#fff; }
  .toolbar { display:none !important; }
  .page { box-shadow:none; margin:0; max-width:100%; }
}
@media (max-width:480px) {
  .toolbar { padding:10px 12px; flex-wrap:wrap; }
  .toolbar .title { font-size:11px; flex-basis:100%; margin-bottom:4px; }
}
</style></head><body>
<div class="toolbar">
  <span class="title">📋 ${wo.name||wo.id}</span>
  <div class="btns">
    <button onclick="window.print()">🖨 Print/PDF</button>
    <button class="close" onclick="window.close()">✕</button>
  </div>
</div>
<div class="page">${reportHTML}</div>
<script>
// iOS hint: tap share button, then Print, then Save to Files
// Auto-trigger print on desktop after 500ms (skip on mobile to avoid annoyance)
if(!/Mobi|Android/i.test(navigator.userAgent)){
  setTimeout(()=>{ try{window.print();}catch(e){} }, 500);
}
<\/script>
</body></html>`;
  
  w.document.open();
  w.document.write(printHTML);
  w.document.close();
  
  notify('✅ เปิดหน้าสรุป — กด Print/PDF ที่หน้านั้น','s');
}

      // Push all FCs with recomputed status (force overwrite — include all fields)
      const FC_CHUNK = 6;
      let pushed = 0;
      for(let i=0;i<FC_DB.length;i+=FC_CHUNK){
        const chunk = FC_DB.slice(i,i+FC_CHUNK).map(fc=>{
          const e = enrichFC(fc);
          // Always include status fields explicitly (even if value is '' or 0)
          return {
            fc:      e.fc,
            fc_num:  e.fc_num,
            sz:      e.sz,
            n_cab:   e.n_cab,
            cab_sns: Array.isArray(e.cab_sns) ? e.cab_sns : (e.cab_sns||[]),
            pdu_sns: Array.isArray(e.pdu_sns) ? e.pdu_sns : (e.pdu_sns||[]),
            note:    e.note||'',
            status:  e.status,
            n_out:   e.n_out||0,
            n_repair:e.n_repair||0,
            currentWO: e.currentWO||''
          };
        });
        try{
          await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',fc:chunk});
          pushed += chunk.length;
          notify('📤 FC '+pushed+'/'+FC_DB.length,'i');
        }catch(e){
          console.warn('FC push fail @ '+i+':', e);
          // Retry individual
          for(const f of chunk){
            try{
              await gsPostJSONP(S.gsUrl, {action:'syncAll',user:S.user||'',fc:[f]});
              pushed++;
            }catch(e2){ console.warn('Single FC fail:', f.fc_num, e2); }
          }
        }
        await new Promise(r=>setTimeout(r,250));
      }
      notify('✅ Fixed '+pushed+'/'+FC_DB.length+' FC status','s');
    }catch(err){
      notify('❌ ' + err.message,'e');
      console.error('FixFC:', err);
    }
  });

  // ── WO Form: all handled by bindWOForm() called via setTimeout ──
  if(S.modal==='wo'&&S.woF) setTimeout(bindWOForm, 0);
  // ── CO modal: co-miss/co-imiss handled by bindCoContentButtons ──
  ['mis-bg','mis-x','mis-x2'].forEach(id=>{

  });
  document.querySelectorAll('[data-mis-confirm]').forEach(b=>b.addEventListener('click',()=>{
    const[id,st]=b.dataset.misConfirm.split(':');
    const isItem = S.missingItemType==='item';
    if(isItem){
      // Mark item as having a problem
      if(!S.woCheck._itemConfirmed) S.woCheck._itemConfirmed={};

      // Update ITEMS status
      const statusMap={lost:'lost',broken:'repair',repair:'repair'};
      const condMap={lost:'damaged',broken:'damaged',repair:'damaged'};

      WO=WO.map(w=>w.id===S.woCheck.id?{...S.woCheck}:w);

      sv(); S.modal='co'; S.missingItem=null; notify(`${id} → ${st==='lost'?'สูญหาย':st==='broken'?'เสีย':'ซ่อม'}`,'w'); render();

  // ── Force close (incomplete) → doForceCloseWO() via bindCoContentButtons ──
  function doForceCloseWO(woId){
    const wo=WO.find(w=>w.id===woId);
    if(!wo)return;
    const live = S.woCheck || wo;
    const cableRet = live._cableReturn || {};
    const procRet = live._procReturn || {};
    // Counts
    const cabRet = (wo.cabs||[]).filter(sn=>!live._confirmed?.[sn]).length;
    const itemRet = (wo.items||[]).filter(id=>live._itemConfirmed?.[id]==='returned').length;
    const cabProblem = (wo.cabs||[]).filter(sn=>live._confirmed?.[sn]).length;
    const itemProblem = (wo.items||[]).filter(id=>['lost','repair','damaged'].includes(live._itemConfirmed?.[id])).length;
    // Problem details
    const cabProblems = (wo.cabs||[]).filter(sn=>live._confirmed?.[sn])
      .map(sn=>`  • ${sn}: ${live._confirmed[sn]==='lost'?'🔴 สูญหาย':live._confirmed[sn]==='broken'?'⚠️ เสีย':'🔧 ซ่อม'}`).join('\n');
    const itemProblems = (wo.items||[]).filter(id=>['lost','repair','damaged'].includes(live._itemConfirmed?.[id]))
      .map(id=>{
        const it=ITEMS.find(i=>i.id===id);
        return `  • ${it?.sn||id}: ${live._itemConfirmed[id]==='lost'?'🔴 สูญหาย':live._itemConfirmed[id]==='repair'?'🔧 ซ่อม':'⚠️ เสีย'}`;
      }).join('\n');
    const cableLines = Object.entries(wo.cables||{}).filter(([k,v])=>v>0)
      .map(([k,v])=>{
        const ret = cableRet[k] ?? v;
        const missing = v - ret;
        return `  • ${CABLE_DB[k]?.name||k}: คืน ${ret}/${v}${missing>0?' ❌ ขาด '+missing:''}`;
      }).join('\n');
    const procLines = Object.entries(wo.procs||{}).filter(([k,v])=>v>0)
      .map(([id,v])=>{
        const ret = procRet[id] ?? v;
        const missing = v - ret;
        const nm=id==='vx2000pro'?'VX2000Pro':id==='cvtm'?'CVT-M':id;
        return `  • ${nm}: คืน ${ret}/${v}${missing>0?' ❌ ขาด '+missing:''}`;
      }).join('\n');
    const summary =
      `⚠️ ปิดใบงาน "ไม่สมบูรณ์"\n\n`+
      `ชื่องาน: ${wo.name}\n\n`+
      `🖥️ Cabinet: คืน ${cabRet}/${wo.cabs.length}\n`+
      ((wo.items||[]).length?`🔧 Items: คืน ${itemRet}/${(wo.items||[]).length}\n`:'')+
      (cableLines?`\n📡 Cable:\n${cableLines}\n`:'')+
      (procLines?`\n💻 Processor:\n${procLines}\n`:'')+
      (cabProblems?`\n🔴 Cabinet มีปัญหา:\n${cabProblems}\n`:'')+
      (itemProblems?`\n🔴 Items มีปัญหา:\n${itemProblems}\n`:'')+
      `\n⚠️ ยืนยันปิดใบงาน "ไม่สมบูรณ์"?`;
    if(!confirm(summary)) return;
    // Restore cabs (those without problem)
    if(!S._dirtyCabSns) S._dirtyCabSns = new Set();
    if(!S._dirtyItemIds) S._dirtyItemIds = new Set();
    CAB=CAB.map(c=>{
      if(wo.cabs.includes(c.sn) && !live._confirmed?.[c.sn]){
        S._dirtyCabSns.add(c.sn);
        return {...c,status:'in_stock',cond:'good',currentWO:null};
      }
      return c;
    });
    (wo.cabs||[]).filter(sn=>live._confirmed?.[sn]).forEach(sn=>S._dirtyCabSns.add(sn));
    // Restore items
    (wo.items||[]).forEach(id=>{
      S._dirtyItemIds.add(id);
      if(live._itemConfirmed?.[id]==='returned'){
        ITEMS=ITEMS.map(i=>i.id===id?{...i,status:'in_stock',cond:'good',currentWO:null}:i);
      }
    });
    // Restore CABLES.out
    Object.entries(wo.cables||{}).forEach(([k,qty])=>{
      const ret = cableRet[k] ?? qty;
      if(CABLES[k]&&ret>0) CABLES[k]={...CABLES[k],out:Math.max(0,(CABLES[k].out||0)-ret)};
    });
    // Restore ACC.out
    const _PROC_ACC_MAP={vx2000pro:'PROC-01',cvtm:'PROC-02'};
    Object.entries(wo.procs||{}).forEach(([id,qty])=>{
      const accId=_PROC_ACC_MAP[id];
      const ret = procRet[id] ?? qty;
      if(accId&&ret>0) ACC=ACC.map(a=>a.id===accId?{...a,out:Math.max(0,(a.out||0)-ret)}:a);
    });
    const updatedWO = {...wo,
      status:'failed',
      completedAt:new Date().toISOString(),
      _closeReport:{cabRet,itemRet,cabProblem,itemProblem,cableRet,procRet,
                    confirmed:live._confirmed||{},itemConfirmed:live._itemConfirmed||{}}
    };
    WO=WO.map(w=>w.id===woId?updatedWO:w);
    sv(); stopScan(); S.modal=null; S.woCheck=null;
    notify(`⚠️ ปิดใบงานไม่สมบูรณ์ — ${cabProblem+itemProblem} มีปัญหา`,'w');
    render();
    if(S.gsUrl){
      clearTimeout(_gsSyncTimer);
      pushCloseWO(updatedWO)
        .then(()=>{ notify('☁️ Sync แล้ว','s'); })
        .catch(e=>{ console.warn('forceClose push failed:',e); debounceGsSync(); });
    }
  }
  window.doForceCloseWO = doForceCloseWO;

  // ── WO Edit button — open modal ──
  document.querySelectorAll('[data-wo-edit]').forEach(b=>b.addEventListener('click',()=>{
    const _woeFound=WO.find(w=>w.id===b.dataset.woEdit)||null;

  // ── WO Edit Modal — all bindings handled by _bindWoeForm() ────────────────
  if(S.modal==='woedit'&&S.woEdit) setTimeout(_bindWoeForm, 0);

  // ── WO Summary ──
  document.querySelectorAll('[data-wo-hist-tab]').forEach(b=>b.addEventListener('click',()=>{

  ['sum-bg','sum-x','sum-x2'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('click',e=>{if(id==='sum-bg'&&e.target!==el)return;S.modal=null;S.woSummary=null;render();});});

  // ── WO Acc edit ──
  document.querySelectorAll('[data-wo-acc-edit]').forEach(b=>b.addEventListener('click',()=>{
    const[key,cur]=b.dataset.woAccEdit.split(':');

    WO=WO.map(w=>w.id===S.woSummary.id?{...S.woSummary}:w);

  // ── Dash goto ──
  document.querySelectorAll('[data-dash-goto]').forEach(b=>b.addEventListener('click',()=>{

    render();
  }));

  // ── Module edit button in cabModal ──
  const btnModEdit=document.getElementById('btn-mod-edit');
  if(btnModEdit)btnModEdit.addEventListener('click',()=>{S.modal='modedit';render();});

  // AI
  const ai=document.getElementById('ai-inp');
  if(ai){ai.addEventListener('input',()=>{S.aiIn=ai.value;});ai.addEventListener('keydown',e=>{if(e.key==='Enter')doAI(S.aiIn);});}

  const cw=document.getElementById('cwrap');if(cw)cw.scrollTop=cw.scrollHeight;
}

// ═══════════ AUTO-SYNC: REAL-TIME MULTI-USER ═══════════════════════════════
let _autoPullTimer=null;
let _autoPullActive=false;

async function autoPull(){
  if(_autoPullActive) return; // prevent overlap
  if(!S.gsUrl||S.autoSyncOn===false||S.gsStatus==='syncing') return;
  if(document.hidden) return; // don't pull when tab not visible
  // CRITICAL: don't pull while user is actively working in a WO modal or scanning.
  // Pulling would rebuild S.woCheck/S.woEdit/S.woF and wipe in-progress scan state
  // (_cableReturn, _procReturn, _itemConfirmed) and disrupt the live camera.
  if(S.scanOn) return;
  if(S.modal==='co' || S.modal==='ret' || S.modal==='wo' || S.modal==='woedit') return;
  // Don't pull while user is typing in an input — could disrupt
  const active = document.activeElement;
  if(active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA')){
    // Skip this cycle if user is typing in WO form/edit
    if(['wn','wl','wr','ws','we','wno','woe-name','woe-loc','woe-resp','woe-start','woe-end','woe-notes'].includes(active.id)) return;
  }
  _autoPullActive=true;
  try{
    const data = await gsJSONP(S.gsUrl + '?action=getAll&silent=1');
    if(data && data.success && data.data){
      let changed=false;
      // Merge CAB
      if(data.data.cabinets && data.data.cabinets.length){
        const map={}; data.data.cabinets.forEach(c=>{map[c.sn]=c;});
        const newCAB = CAB.map(c=>{
          if(map[c.sn]){
            const g=map[c.sn];
            if(c.status!==g.status||c.cond!==g.cond||(c.currentWO||'')!==(g.currentWO||'')){
              changed=true;
              return {...c, status:g.status||c.status, cond:g.cond||c.cond, currentWO:g.currentWO||null};
            }
          }
          return c;
        });
        if(changed) CAB=newCAB;
      }
      // Merge ITEMS from v6 split (structure + spare)
      const allRemoteIt = [
        ...(data.data?.structure||[]),
        ...(data.data?.spare||[]),
        ...(data.data?.items||[])
      ];
      if(allRemoteIt.length){
        const imap={}; allRemoteIt.forEach(i=>{ if(i.id) imap[i.id]=i; });
        const newITEMS = ITEMS.map(i=>{
          if(imap[i.id]){
            const g=imap[i.id];
            if(i.status!==g.status||(i.currentWO||'')!==(g.currentWO||'')){
              changed=true;
              return {...i, status:g.status||i.status, cond:g.cond||i.cond, currentWO:g.currentWO||null};
            }
          }
          return i;
        });
        if(changed) ITEMS=newITEMS;
      }
      // Merge CABLES
      if(data.data.cables){
        data.data.cables.forEach(c=>{
          if(CABLES[c.key] && (CABLES[c.key].out!==c.out || CABLES[c.key].repair!==c.repair)){
            changed=true;
            CABLES[c.key]={...CABLES[c.key],out:c.out||0,repair:c.repair||0};
          }
        });
      }
      // Merge ACC
      if(data.data.acc){
        data.data.acc.forEach(a=>{
          const old=ACC.find(x=>x.id===a.id);
          if(old && (old.out!==a.out || old.repair!==a.repair)){
            changed=true;
            ACC=ACC.map(x=>x.id===a.id?{...x,out:a.out||0,repair:a.repair||0}:x);
          }
        });
      }
      // Merge WO smartly — keep local WOs that haven't been pushed yet
      if(data.data.workOrders){
        const remoteWO = data.data.workOrders;
        const remoteMap = {};
        remoteWO.forEach(w=>{ remoteMap[w.id]=w; });
        const localMap = {};
        WO.forEach(w=>{ localMap[w.id]=w; });
        
        // Build merged list
        const merged = [];
        const seenIds = new Set();
        
        // 1. Process local WOs in order (preserve local ordering)
        WO.forEach(localW=>{
          seenIds.add(localW.id);
          const remoteW = remoteMap[localW.id];
          if(!remoteW){
            // Local-only WO (newly created, not yet pushed) → KEEP
            merged.push(localW);
          } else {
            // Both have it — pick the more recent based on completedAt/status priority
            // If local is 'active' and remote is 'completed' → use remote (completed wins)
            // If local has changes (different status/data), use the one with later timestamp
            const lTime = new Date(localW.completedAt||localW.createdAt||0).getTime();
            const rTime = new Date(remoteW.completedAt||remoteW.createdAt||0).getTime();
            // Prefer the one with completed status, or most recent
            if(localW.status==='active' && remoteW.status!=='active'){
              merged.push(remoteW); // Remote got closed → use remote
            } else if(remoteW.status==='active' && localW.status!=='active'){
              merged.push(localW); // Local got closed → keep local (will push)
            } else if(rTime > lTime){
              merged.push(remoteW);
            } else {
              merged.push(localW); // Local is newer/same — keep local
            }
          }
        });
        
        // 2. Add remote-only WOs (created on another device)
        remoteWO.forEach(rw=>{
          if(!seenIds.has(rw.id)) merged.push(rw);
        });
        
        // Sort by createdAt desc (newest first)
        merged.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
        
        // Check if anything actually changed
        const sig = arr => JSON.stringify(arr.map(w=>w.id+':'+w.status+':'+(w.cabs||[]).length+':'+(w.completedAt||'')).sort());
        if(sig(WO) !== sig(merged)){
          WO = merged;
          changed=true;
        }
      }
      // ── reconcile: WO เป็น source of truth — แก้ counter ที่อาจถูก server ทับเป็น in_stock
      const reconciledChanged = reconcileFromWO();
      if(reconciledChanged) changed=true;
      S.lastSync = new Date().toISOString();
      if(changed){
        // Don't re-render if modal is open (user is in middle of edit)
        if(!S.modal || S.modal==='gsconfig') render();
        else updateSyncBadge();
      } else {
        updateSyncBadge();
      }
    }
  }catch(e){
    // Silent fail for auto-pull
  } finally {
    _autoPullActive=false;
  }
}

function startAutoPull(){
  if(_autoPullTimer) clearInterval(_autoPullTimer);
  _autoPullTimer = setInterval(autoPull, 20000); // every 20s
}

// Pull on tab focus
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && S.gsUrl && S.autoSyncOn!==false){
    setTimeout(autoPull, 500);
  }
});
// Pull on window focus (mobile browsers)
window.addEventListener('focus', ()=>{
  if(S.gsUrl && S.autoSyncOn!==false) setTimeout(autoPull, 500);
});

// Start polling
startAutoPull();

</script>
